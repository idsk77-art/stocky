<!doctype html>
<html lang="ko" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>주도섹터 앱</title>
  <style>
    :root{
      --bg:#f4f7fb;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --accent:#111827;
      --accent2:#2563eb;
      --good:#16a34a;
      --bad:#dc2626;
      --shadow:0 8px 24px rgba(15,23,42,.08);
      --radius:20px;
      --chip:#eef4ff;
      --sector:#2d9cdb;
      --preview:#f8fafc;
    }
    html[data-theme="dark"]{
      --bg:#0b1220;
      --card:#111827;
      --text:#e5e7eb;
      --muted:#94a3b8;
      --line:#223047;
      --accent:#f9fafb;
      --accent2:#60a5fa;
      --good:#4ade80;
      --bad:#f87171;
      --shadow:0 10px 26px rgba(0,0,0,.28);
      --chip:#172235;
      --sector:#20364d;
      --preview:#0f172a;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    .app{
      max-width:430px;
      margin:0 auto;
      min-height:100vh;
      padding:14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }
    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      padding-top:4px;
    }
    .title h1{
      margin:0;
      font-size:22px;
      line-height:1.1;
      letter-spacing:-.03em;
    }
    .title p{
      margin:6px 0 0;
      color:var(--muted);
      font-size:12px;
      line-height:1.4;
    }
    .actions{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    button{
      border:0;
      border-radius:999px;
      padding:10px 13px;
      font-weight:800;
      font-size:12px;
      cursor:pointer;
      color:var(--text);
      background:var(--card);
      box-shadow:var(--shadow);
      border:1px solid var(--line);
    }
    button.primary{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }
    .iconbtn{
      width:40px;
      height:40px;
      padding:0;
      display:grid;
      place-items:center;
      border-radius:50%;
    }
    .status{
      display:flex;
      justify-content:space-between;
      gap:10px;
      font-size:11px;
      color:var(--muted);
      padding:0 2px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .card-h{
      padding:14px 14px 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }
    .card-h h2{
      margin:0;
      font-size:15px;
    }
    .pill{
      font-size:11px;
      padding:6px 9px;
      border-radius:999px;
      background:rgba(37,99,235,.1);
      color:var(--accent2);
      font-weight:700;
    }
    .summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      padding:14px;
    }
    .stat{
      background:color-mix(in srgb, var(--card) 75%, var(--bg));
      border:1px solid var(--line);
      border-radius:18px;
      padding:12px;
    }
    .stat .k{
      font-size:11px;
      color:var(--muted);
      margin-bottom:7px;
    }
    .stat .v{
      font-size:17px;
      font-weight:800;
      letter-spacing:-.02em;
    }
    .filters{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:14px;
      scrollbar-width:none;
    }
    .filters::-webkit-scrollbar{display:none}
    .filter{
      white-space:nowrap;
      padding:9px 13px;
      background:transparent;
      box-shadow:none;
      border:1px solid var(--line);
      color:var(--text);
    }
    .filter.active{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }
    .sortrow{
      display:flex;
      gap:8px;
      overflow:auto;
      padding:0 14px 12px;
      scrollbar-width:none;
    }
    .sortrow::-webkit-scrollbar{display:none}
    .sort{
      white-space:nowrap;
      padding:8px 12px;
      border-radius:999px;
      background:var(--chip);
      border:1px solid var(--line);
      font-size:12px;
      font-weight:800;
    }
    .sort.active{
      background:var(--accent);
      color:#fff;
      border-color:transparent;
    }
    .list{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:0 14px 14px;
    }
    .sector{
      border-radius:22px;
      overflow:hidden;
      background:var(--sector);
    }
    .sector-head{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding:14px;
      align-items:flex-start;
    }
    .sector-name{
      display:flex;
      flex-direction:column;
      gap:4px;
    }
    .sector-name strong{
      font-size:18px;
      letter-spacing:-.02em;
    }
    .sector-name span{
      font-size:12px;
      opacity:.92;
    }
    .metrics{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }
    .metric{
      background:rgba(255,255,255,.84);
      color:#0f172a;
      border-radius:999px;
      padding:7px 10px;
      font-size:11px;
      font-weight:800;
    }
    .stocks{
      background:rgba(255,255,255,.18);
      backdrop-filter:blur(8px);
      padding:0 14px 10px;
    }
    .stock{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:10px;
      align-items:center;
      padding:11px 0;
      border-top:1px solid rgba(255,255,255,.18);
    }
    .stock:first-child{border-top:0}
    .stock .name{
      font-weight:800;
      font-size:15px;
    }
    .stock .tag{
      font-size:11px;
      opacity:.9;
    }
    .stock .price,.stock .chg{
      font-weight:800;
      font-size:13px;
    }
    .chg.up{color:#083}
    .chg.down{color:#b11}

    .sector-list{
      display:flex;
      flex-direction:column;
      gap:10px;
      padding:0 14px 14px;
    }
    .item{
      border:1px solid var(--line);
      background:var(--card);
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 4px 14px rgba(15,23,42,.05);
    }
    .item-main{
      display:grid;
      grid-template-columns:auto 1fr auto;
      gap:10px;
      align-items:center;
      padding:12px;
      cursor:pointer;
    }
    .rank{
      width:32px;
      height:32px;
      border-radius:10px;
      background:var(--chip);
      display:grid;
      place-items:center;
      font-size:12px;
      font-weight:900;
      color:var(--text);
      flex:none;
    }
    .item-info{
      min-width:0;
    }
    .item-info .row1{
      display:flex;
      align-items:center;
      gap:8px;
      flex-wrap:wrap;
    }
    .item-info .name{
      font-size:15px;
      font-weight:900;
      letter-spacing:-.02em;
    }
    .badge{
      font-size:11px;
      padding:4px 8px;
      border-radius:999px;
      background:var(--chip);
      color:var(--muted);
      border:1px solid var(--line);
    }
    .item-info .row2{
      margin-top:4px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
    }
    .arrow{
      width:34px;
      height:34px;
      border-radius:50%;
      background:var(--chip);
      display:grid;
      place-items:center;
      font-weight:900;
      border:1px solid var(--line);
      flex:none;
    }
    .item-preview{
      display:none;
      border-top:1px solid var(--line);
      background:var(--preview);
      padding:12px;
    }
    .item.open .item-preview{
      display:block;
    }
    .preview-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
    }
    .pbox{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      padding:10px;
    }
    .pbox .k{
      font-size:11px;
      color:var(--muted);
      margin-bottom:5px;
    }
    .pbox .v{
      font-size:14px;
      font-weight:800;
      letter-spacing:-.01em;
    }
    .preview-note{
      margin-top:10px;
      font-size:12px;
      color:var(--muted);
      line-height:1.5;
    }
    .miniList{
      display:flex;
      flex-direction:column;
      gap:8px;
      padding:14px;
    }
    .miniRow{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:center;
      padding:11px 12px;
      border-radius:16px;
      background:color-mix(in srgb, var(--card) 72%, var(--bg));
      border:1px solid var(--line);
    }
    .miniRow b{font-size:14px}
    .miniRow span{font-size:12px;color:var(--muted)}
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.35);
      display:none;
      align-items:flex-end;
      justify-content:center;
      z-index:30;
    }
    .overlay.show{display:flex}
    .sheet{
      width:min(430px,100%);
      background:var(--card);
      border-radius:24px 24px 0 0;
      border:1px solid var(--line);
      box-shadow:0 -16px 32px rgba(0,0,0,.22);
      padding:14px;
      max-height:85vh;
      overflow:auto;
    }
    .sheet-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:10px;
    }
    .sheet-head h3{margin:0;font-size:16px}
    .field{margin-bottom:12px}
    .field label{
      display:block;
      font-size:12px;
      font-weight:800;
      margin:0 0 6px;
    }
    .field input,.field select{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      background:transparent;
      color:var(--text);
      font-size:14px;
      outline:none;
    }
    .btnrow{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:4px;
    }
    .warn{
      border-left:4px solid #f59e0b;
      background:rgba(245,158,11,.08);
      padding:10px 12px;
      border-radius:14px;
      margin-top:12px;
      color:var(--text);
      font-size:12px;
      line-height:1.45;
    }
    .footer{
      color:var(--muted);
      text-align:center;
      font-size:11px;
      padding-top:2px;
    }
    @media (max-width:390px){
      .summary{grid-template-columns:1fr}
      .sector-head{flex-direction:column}
      .metrics{justify-content:flex-start}
      .stock{grid-template-columns:1fr auto}
      .stock .tag{display:none}
      .title h1{font-size:22px}
      .item-main{grid-template-columns:auto 1fr}
      .arrow{display:none}
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <h1>주도섹터</h1>
        <p>전체 종목을 먼저 보여주고, 분야 선택 시 최상단으로 올립니다.</p>
      </div>
      <div class="actions">
        <button id="themeBtn" aria-label="테마 변경" title="테마 변경">🌙</button>
        <button id="refreshBtn" class="primary" aria-label="새로고침" title="새로고침">⏳ 30</button>
        <button id="settingBtn" class="iconbtn" aria-label="환경설정" title="환경설정">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.3l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06A2 2 0 1 1 19.71 7l-.06.06A1.65 1.65 0 0 0 19.4 9c.38.31.77.71 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="status">
      <div id="lastUpdated">업데이트 대기중</div>
      <div id="connectionStatus">연결 확인중</div>
    </div>

    <div class="card">
      <div class="card-h">
        <h2>첫화면 요약</h2>
        <span class="pill" id="modePill">화이트 테마</span>
      </div>
      <div class="summary" id="homeSummary"></div>
    </div>

    <div class="card">
      <div class="card-h">
        <h2>주도섹터 페이지</h2>
        <span class="pill">전체 종목 + 분류 선택</span>
      </div>
      <div class="filters" id="filters"></div>
      <div class="sortrow" id="sortrow"></div>
      <div class="sector-list" id="sectorList"></div>
    </div>

    <div class="card">
      <div class="card-h">
        <h2>실시간 상위 종목</h2>
        <span class="pill">웹 데이터</span>
      </div>
      <div class="miniList" id="topList"></div>
    </div>

    <div class="footer">실데이터가 실패하면 샘플 데이터로 자동 대체</div>
  </div>

  <div class="overlay" id="settingsOverlay" aria-hidden="true">
    <div class="sheet">
      <div class="sheet-head">
        <h3>환경설정</h3>
        <button id="closeSettingBtn">닫기</button>
      </div>
      <div class="field"><label>계좌번호</label><input id="cano" placeholder="예: 44614025" /></div>
      <div class="field"><label>상품코드</label><input id="prdt" placeholder="예: 01" /></div>
      <div class="field"><label>App Key</label><input id="appKey" placeholder="API Key 입력" /></div>
      <div class="field"><label>App Secret</label><input id="appSecret" placeholder="API Secret 입력" /></div>
      <div class="field"><label>환경</label><select id="envType"><option value="live">실계좌</option><option value="paper">모의투자</option></select></div>
      <div class="btnrow">
        <button id="saveSettingBtn" class="primary">저장</button>
        <button id="loadSettingBtn">불러오기</button>
        <button id="clearSettingBtn">초기화</button>
        <button id="testSettingBtn">연결 테스트</button>
      </div>
      <div class="warn">민감정보를 브라우저에 저장하는 방식은 편리하지만 보안상 권장되지 않는다. 가능하면 서버에서 토큰을 발급하고 브라우저에는 결과 데이터만 내려주는 구조가 더 안전하다.</div>
    </div>
  </div>

<script>
const REFRESH_MS = 30000;
const THEMES = { light: '화이트 테마', dark: '블랙 테마' };

const SAMPLE = {
  market: { core: '반도체', tone: '강세', alert: '3건', refresh: '30초' },
  filters: ['전체', '반도체', '2차전지', '바이오', '로봇', '방어주'],
  sorts: ['기본순위', '거래대금', '수익률', '시총', '변동성'],
  sectors: [
    { name:'삼성전자', sector:'반도체', reason:'AI 메모리 수요 확대', color:'#2D9CDB', chg:'+9.7%', volume:'2.39조', marketCap:'458조', volRank:1, roi:'+1.8%', stocks:[{name:'삼성전자', tag:'메모리', price:'72,000', chg:'+1.8%'},{name:'SK하이닉스', tag:'HBM', price:'168,000', chg:'+2.3%'},{name:'한미반도체', tag:'장비', price:'182,000', chg:'+6.4%'}]},
    { name:'에코프로', sector:'2차전지', reason:'ESS·리사이클 기대', color:'#EB5757', chg:'+8.5%', volume:'거래 집중', marketCap:'38조', volRank:2, roi:'+12.5%', stocks:[{name:'에코프로', tag:'소재', price:'121,000', chg:'+12.5%'},{name:'에코프로비엠', tag:'양극재', price:'238,000', chg:'+11.2%'},{name:'포스코퓨처엠', tag:'양극재', price:'284,000', chg:'+4.7%'}]},
    { name:'삼성바이오로직스', sector:'바이오', reason:'임상/실적 모멘텀', color:'#F2C94C', chg:'+7.2%', volume:'이벤트 집중', marketCap:'73조', volRank:3, roi:'+2.1%', stocks:[{name:'삼성바이오로직스', tag:'실적', price:'1,020,000', chg:'+2.1%'},{name:'알테오젠', tag:'플랫폼', price:'287,000', chg:'+4.5%'},{name:'HLB', tag:'이슈', price:'91,800', chg:'+3.2%'}]},
    { name:'레인보우로보틱스', sector:'로봇', reason:'자동화 투자 확대', color:'#27AE60', chg:'+6.1%', volume:'후속주 확산', marketCap:'11조', volRank:4, roi:'+5.8%', stocks:[{name:'레인보우로보틱스', tag:'대장주', price:'251,000', chg:'+5.8%'},{name:'두산로보틱스', tag:'협동로봇', price:'64,200', chg:'+2.9%'},{name:'에스피지', tag:'감속기', price:'34,750', chg:'+4.1%'}]},
    { name:'KT', sector:'방어주', reason:'배당·수급 안정', color:'#9B51E0', chg:'+2.4%', volume:'안정', marketCap:'9조', volRank:5, roi:'+1.2%', stocks:[{name:'KT', tag:'통신', price:'38,250', chg:'+0.9%'},{name:'SK텔레콤', tag:'통신', price:'54,300', chg:'+0.6%'},{name:'LG유플러스', tag:'통신', price:'10,850', chg:'+1.1%'}]},
  ],
  top:[
    {name:'삼성전자',cat:'반도체',chg:'+9.72%',vol:'2.39조'},
    {name:'삼화콘덴서',cat:'MLCC',chg:'+29.94%',vol:'5,362억'},
    {name:'에코프로',cat:'2차전지',chg:'+12.56%',vol:'8,771억'},
    {name:'알테오젠',cat:'바이오',chg:'+4.55%',vol:'4,145억'}
  ]
};

let state = {
  theme: localStorage.getItem('theme') || 'light',
  timer: null,
  data: SAMPLE,
  countdown: 30,
  activeSector: '전체',
  activeSort: '기본순위',
  openIndex: null
};

const el = {
  themeBtn: document.getElementById('themeBtn'),
  refreshBtn: document.getElementById('refreshBtn'),
  settingBtn: document.getElementById('settingBtn'),
  modePill: document.getElementById('modePill'),
  lastUpdated: document.getElementById('lastUpdated'),
  connectionStatus: document.getElementById('connectionStatus'),
  homeSummary: document.getElementById('homeSummary'),
  filters: document.getElementById('filters'),
  sortrow: document.getElementById('sortrow'),
  sectorList: document.getElementById('sectorList'),
  topList: document.getElementById('topList'),
  overlay: document.getElementById('settingsOverlay'),
  closeSettingBtn: document.getElementById('closeSettingBtn'),
  saveSettingBtn: document.getElementById('saveSettingBtn'),
  loadSettingBtn: document.getElementById('loadSettingBtn'),
  clearSettingBtn: document.getElementById('clearSettingBtn'),
  testSettingBtn: document.getElementById('testSettingBtn'),
  cano: document.getElementById('cano'),
  prdt: document.getElementById('prdt'),
  appKey: document.getElementById('appKey'),
  appSecret: document.getElementById('appSecret'),
  envType: document.getElementById('envType')
};

function themeApply(t){
  document.documentElement.setAttribute('data-theme', t);
  el.themeBtn.textContent = t === 'light' ? '🌙' : '☀️';
  el.modePill.textContent = THEMES[t];
  localStorage.setItem('theme', t);
}

function renderHome(d){
  el.homeSummary.innerHTML = `
    <div class="stat"><div class="k">핵심 섹터</div><div class="v">${d.market.core}</div></div>
    <div class="stat"><div class="k">시장 온도</div><div class="v">${d.market.tone}</div></div>
    <div class="stat"><div class="k">알림</div><div class="v">${d.market.alert}</div></div>
    <div class="stat"><div class="k">갱신 주기</div><div class="v">${d.market.refresh}</div></div>
  `;
}

function renderFilters(items){
  el.filters.innerHTML = '';
  items.forEach(x => {
    const b = document.createElement('button');
    b.className = 'filter' + (state.activeSector === x ? ' active' : '');
    b.textContent = x;
    b.onclick = () => {
      state.activeSector = x;
      if (x !== '전체') {
        const idx = state.data.sectors.findIndex(s => s.sector === x);
        if (idx >= 0) {
          const picked = state.data.sectors.splice(idx, 1)[0];
          state.data.sectors.unshift(picked);
        }
      }
      state.openIndex = null;
      renderAll();
    };
    el.filters.appendChild(b);
  });
}

function renderSorts(items){
  el.sortrow.innerHTML = '';
  items.forEach(x => {
    const b = document.createElement('button');
    b.className = 'sort' + (state.activeSort === x ? ' active' : '');
    b.textContent = x;
    b.onclick = () => {
      state.activeSort = x;
      sortData();
      renderAll();
    };
    el.sortrow.appendChild(b);
  });
}

function sortData(){
  const key = state.activeSort;
  if (key === '기본순위') return;
  const fn = {
    '거래대금': (a,b) => parseFloat(b.volume.replace(/[^0-9.]/g,'')) - parseFloat(a.volume.replace(/[^0-9.]/g,'')),
    '수익률': (a,b) => parseFloat(b.roi.replace(/[^0-9.-]/g,'')) - parseFloat(a.roi.replace(/[^0-9.-]/g,'')),
    '시총': (a,b) => parseFloat(b.marketCap.replace(/[^0-9.]/g,'')) - parseFloat(a.marketCap.replace(/[^0-9.]/g,'')),
    '변동성': (a,b) => b.name.length - a.name.length
  }[key];
  if (fn) state.data.sectors.sort(fn);
}

function previewHTML(sec){
  return `
    <div class="item-preview">
      <div class="preview-grid">
        <div class="pbox"><div class="k">현재가 기준</div><div class="v">${sec.stocks[0].price}</div></div>
        <div class="pbox"><div class="k">등락률</div><div class="v">${sec.chg}</div></div>
        <div class="pbox"><div class="k">거래대금</div><div class="v">${sec.volume}</div></div>
        <div class="pbox"><div class="k">시가총액</div><div class="v">${sec.marketCap}</div></div>
      </div>
      <div class="preview-note">
        핵심 포인트: ${sec.reason}<br>
        관련 종목: ${sec.stocks.map(s=>s.name).join(' · ')}
      </div>
    </div>
  `;
}

function renderSectorList(data){
  el.sectorList.innerHTML = '';
  data.sectors.forEach((sec, idx) => {
    const open = state.openIndex === idx;
    const item = document.createElement('div');
    item.className = 'item' + (open ? ' open' : '');
    item.innerHTML = `
      <div class="item-main" data-idx="${idx}">
        <div class="rank">${idx+1}</div>
        <div class="item-info">
          <div class="row1">
            <div class="name">${sec.name}</div>
            <span class="badge">${sec.sector}</span>
            ${state.activeSector !== '전체' && sec.sector === state.activeSector ? '<span class="badge">선택됨</span>' : ''}
          </div>
          <div class="row2">
            <span>거래대금 ${sec.volume}</span>
            <span>수익률 ${sec.roi}</span>
            <span>강도 A+</span>
          </div>
        </div>
        <div class="arrow">${open ? '−' : '＋'}</div>
      </div>
      ${open ? previewHTML(sec) : ''}
    `;
    item.querySelector('.item-main').onclick = () => {
      state.openIndex = state.openIndex === idx ? null : idx;
      renderAll();
    };
    el.sectorList.appendChild(item);
  });
}

function renderTop(data){
  el.topList.innerHTML = data.top.map((x,i)=>`
    <div class="miniRow">
      <div><b>${i+1}. ${x.name}</b><div><span>${x.cat}</span></div></div>
      <div style="text-align:right"><b>${x.chg}</b><div><span>${x.vol}</span></div></div>
    </div>
  `).join('');
}

function showSettings(){
  el.overlay.classList.add('show');
  el.overlay.setAttribute('aria-hidden','false');
  loadConfig();
}
function hideSettings(){
  el.overlay.classList.remove('show');
  el.overlay.setAttribute('aria-hidden','true');
}
function saveConfig(){
  const data = {
    cano: el.cano.value.trim(),
    prdt: el.prdt.value.trim(),
    appKey: el.appKey.value.trim(),
    appSecret: el.appSecret.value.trim(),
    envType: el.envType.value
  };
  localStorage.setItem('kis_config', JSON.stringify(data));
  el.connectionStatus.textContent = '설정 저장됨';
}
function loadConfig(){
  const data = JSON.parse(localStorage.getItem('kis_config') || '{}');
  el.cano.value = data.cano || '';
  el.prdt.value = data.prdt || '';
  el.appKey.value = data.appKey || '';
  el.appSecret.value = data.appSecret || '';
  el.envType.value = data.envType || 'live';
}
function clearConfig(){
  localStorage.removeItem('kis_config');
  loadConfig();
  el.connectionStatus.textContent = '설정 초기화';
}

async function testConn(){
  el.connectionStatus.textContent = '테스트중';
  try{
    const cfg = JSON.parse(localStorage.getItem('kis_config') || '{}');
    if(!cfg.appKey || !cfg.appSecret) throw new Error('missing');
    const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.github.com'), { cache:'no-store' });
    if(!res.ok) throw new Error('network');
    el.connectionStatus.textContent = '연결 시도 성공';
  }catch(e){
    el.connectionStatus.textContent = '입력 확인 필요';
  }
}

async function fetchReal(){
  el.connectionStatus.textContent = '불러오는중';
  try{
    const res = await fetch('https://api.allorigins.win/raw?url=' + encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols=^KS11,005930.KS,000660.KS'), { cache:'no-store' });
    if(!res.ok) throw new Error('fetch');
    state.data = SAMPLE;
    el.connectionStatus.textContent = '실데이터 시도됨';
  }catch(e){
    state.data = SAMPLE;
    el.connectionStatus.textContent = '샘플 데이터 표시';
  }
  state.countdown = 30;
  renderAll();
  el.lastUpdated.textContent = '최종 갱신: ' + new Date().toLocaleTimeString('ko-KR');
}

function renderAll(){
  renderHome(state.data);
  renderFilters(state.data.filters);
  renderSorts(state.data.sorts);
  renderSectorList(state.data);
  renderTop(state.data);
  el.refreshBtn.textContent = '⏳ ' + state.countdown;
}

function poll(){
  clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.countdown = Math.max(0, state.countdown - 1);
    el.refreshBtn.textContent = '⏳ ' + state.countdown;
    if(state.countdown <= 0) fetchReal();
  }, 1000);
}

el.themeBtn.onclick = () => themeApply(state.theme = state.theme === 'light' ? 'dark' : 'light');
el.refreshBtn.onclick = fetchReal;
el.settingBtn.onclick = showSettings;
el.closeSettingBtn.onclick = hideSettings;
el.overlay.addEventListener('click', e => { if(e.target === el.overlay) hideSettings(); });
el.saveSettingBtn.onclick = saveConfig;
el.loadSettingBtn.onclick = loadConfig;
el.clearSettingBtn.onclick = clearConfig;
el.testSettingBtn.onclick = testConn;

themeApply(state.theme);
renderAll();
loadConfig();
fetchReal();
poll();
</script>
</body>
</html>
