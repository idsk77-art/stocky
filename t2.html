<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>주도섹터 앱</title>
<style>
:root{
  /* 라이트 테마 변수 */
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --line: #e2e8f0;
  --accent: #0f172a;
  --text-on-accent: #ffffff;
  --accent2: #2563eb;
  --shadow: 0 8px 24px rgba(15,23,42,.06);
  --radius: 20px;
  --chip: #f1f5f9;
  --preview: #f8fafc;
  --preview2: #ffffff;
  
  /* 리스트 배경 컬러 믹스 비율 */
  --bg-mix: 15%;

  /* 동적 8색 팔레트 (라이트) */
  --c-1: #93c5fd; /* 파랑 */
  --c-2: #fca5a5; /* 빨강 */
  --c-3: #fde047; /* 노랑 */
  --c-4: #86efac; /* 초록 */
  --c-5: #d8b4fe; /* 보라 */
  --c-6: #fdba74; /* 주황 */
  --c-7: #67e8f9; /* 청록 */
  --c-8: #f9a8d4; /* 핑크 */
  --text-on-sec: #0f172a;
}
html[data-theme="dark"]{
  /* 다크 테마 변수 */
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f8fafc;
  --muted: #94a3b8;
  --line: #334155;
  --accent: #3b82f6; 
  --text-on-accent: #ffffff;
  --accent2: #60a5fa;
  --shadow: 0 10px 26px rgba(0,0,0,.4);
  --chip: #334155;
  --preview: #0f172a;
  --preview2: #1e293b;

  /* 리스트 배경 컬러 믹스 비율 (다크모드에서는 색이 더 잘보이게 비율업) */
  --bg-mix: 25%;

  /* 동적 8색 팔레트 (다크) - 눈에 잘 띄는 밝은 톤으로 변경 */
  --c-1: #60a5fa; /* 파랑 */
  --c-2: #f87171; /* 빨강 */
  --c-3: #fde047; /* 노랑 */
  --c-4: #4ade80; /* 초록 */
  --c-5: #c084fc; /* 보라 */
  --c-6: #fb923c; /* 주황 */
  --c-7: #22d3ee; /* 청록 */
  --c-8: #f472b6; /* 핑크 */
  --text-on-sec: #0f172a;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
  transition: background-color 0.2s, color 0.2s;
}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding:12px 12px 16px;
  display:flex;
  flex-direction:column;
  gap:12px
}
.topbar{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-top:2px
}
.topline{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px
}
.title h1{
  margin:0;
  font-size:22px;
  letter-spacing:-.03em;
  line-height:1.1
}
.actions{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:nowrap;
  justify-content:flex-end;
  white-space:nowrap
}
button{
  border:0;
  border-radius:999px;
  padding:10px 13px;
  font-weight:800;
  font-size:12px;
  cursor:pointer;
  color:var(--text);
  background:var(--card);
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  transition: all 0.15s;
}
button:active {
  transform: scale(0.96);
}
button.primary{
  background:var(--accent);
  color:var(--text-on-accent);
  border-color:transparent
}
.iconbtn{
  width:40px;
  height:40px;
  padding:0;
  display:grid;
  place-items:center;
  border-radius:50%
}
.status{
  display:flex;
  justify-content:space-between;
  gap:10px;
  font-size:11px;
  color:var(--muted);
  padding:0 2px
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden
}
.card-h{
  padding:14px 14px 0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px
}
.card-h h2{
  margin:0;
  font-size:15px
}
.pill{
  font-size:11px;
  padding:6px 9px;
  border-radius:999px;
  background:rgba(37,99,235,.1);
  color:var(--accent2);
  font-weight:700
}
.tabs {
  display: flex;
  gap: 8px;
  padding: 12px 14px 0;
}
.tab {
  flex: 1;
  text-align: center;
  padding: 10px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 800;
  background: var(--chip);
  color: var(--muted);
  box-shadow: none;
}
.tab.active {
  background: var(--accent);
  color: var(--text-on-accent);
  border-color: transparent;
}
.filters,.sortrow{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:12px 14px 0;
  scrollbar-width:none
}
.filters::-webkit-scrollbar,.sortrow::-webkit-scrollbar{display:none}
.filter,.sort{
  white-space:nowrap;
  padding:9px 13px;
  border-radius:999px;
  border:1px solid transparent;
  font-size:12px;
  font-weight:800;
  color:var(--text);
  box-shadow:none
}
.sort{
  background:var(--chip);
  border-color:var(--line);
}
.sort.active{
  background:var(--accent);
  color:var(--text-on-accent);
  border-color:transparent
}
.list{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px 14px 14px
}
.item{
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  background:var(--card);
  box-shadow: 0 4px 14px rgba(0,0,0,.03);
}
html[data-theme="dark"] .item {
  box-shadow: 0 4px 14px rgba(0,0,0,.2);
}
.item-main{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  padding:12px;
  cursor:pointer
}
.rank{
  width:32px;
  height:32px;
  border-radius:10px;
  background:color-mix(in srgb, var(--text) 10%, transparent);
  display:grid;
  place-items:center;
  font-size:12px;
  font-weight:900;
  color:var(--text)
}
.item-info{min-width:0}
.item-info .row1{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap
}
.item-info .name{
  font-size:15px;
  font-weight:900;
  letter-spacing:-.02em;
  color:var(--text)
}
.badge{
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
  background:color-mix(in srgb, var(--text) 8%, transparent);
  color:var(--text);
  border:1px solid color-mix(in srgb, var(--text) 15%, transparent);
}
.item-info .row2{
  margin-top:4px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:12px
}
.arrow{
  width:34px;
  height:34px;
  border-radius:50%;
  background:color-mix(in srgb, var(--text) 5%, transparent);
  display:grid;
  place-items:center;
  font-weight:900;
  border:1px solid var(--line)
}
.item.open .item-preview{display:block}
.item-preview{
  display:none;
  border-top:1px solid var(--line);
  background:var(--preview);
  padding:12px
}
.preview-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px
}
.pbox{
  background:var(--preview2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px
}
.pbox .k{
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px
}
.pbox .v{
  font-size:14px;
  font-weight:800;
  letter-spacing:-.01em;
  color:var(--text);
}
.preview-note{
  margin-top:10px;
  font-size:12px;
  color:var(--text);
  line-height:1.5
}
.miniList{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:14px
}
.miniRow{
  display:flex;
  justify-content:space-between;
  gap:8px;
  align-items:center;
  padding:11px 12px;
  border-radius:16px;
  background:var(--chip);
  border:1px solid var(--line)
}
.miniRow b{font-size:14px; color:var(--text)}
.miniRow span{font-size:12px;color:var(--muted)}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:30
}
.overlay.show{display:flex}
.sheet{
  width:min(430px,100%);
  background:var(--card);
  border-radius:24px 24px 0 0;
  border:1px solid var(--line);
  box-shadow:0 -16px 32px rgba(0,0,0,.3);
  padding:14px;
  max-height:85vh;
  overflow:auto
}
.sheet-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px
}
.sheet-head h3{margin:0;font-size:16px}
.field{margin-bottom:12px}
.field label{
  display:block;
  font-size:12px;
  font-weight:800;
  margin:0 0 6px
}
.field input,.field select{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  background:var(--bg);
  color:var(--text);
  font-size:14px;
  outline:none
}
.field input:focus,.field select:focus{
  border-color: var(--accent2);
}
.btnrow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:4px
}
.pill-toggle {
  padding: 8px 12px;
  border-radius: 999px;
  border: 1px solid var(--line);
  background: var(--chip);
  color: var(--text);
  font-size: 12px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: none;
}
.pill-toggle.active {
  background: var(--accent2);
  color: #fff;
  border-color: var(--accent2);
}
.warn{
  border-left:4px solid #f59e0b;
  background:rgba(245,158,11,.1);
  padding:10px 12px;
  border-radius:14px;
  margin-top:12px;
  color:var(--text);
  font-size:12px;
  line-height:1.45
}
.footer{
  color:var(--muted);
  text-align:center;
  font-size:11px;
  padding-top:2px
}
@media (max-width:390px){
  .item-main{grid-template-columns:auto 1fr}
  .arrow{display:none}
  .title h1{font-size:20px}
}
</style>
</head>
<body>

    <div class="sortrow" id="sortrow"></div>
    <div class="list" id="sectorList"></div>
  </div>

  <div class="card">
    <div class="card-h"><h2>실시간 상위 종목</h2><span class="pill">웹 데이터</span></div>
    <div class="miniList" id="topList"></div>
  </div>

  <div class="footer">실데이터가 실패하면 샘플 데이터로 자동 대체</div>
</div>

<div class="overlay" id="settingsOverlay" aria-hidden="true">
  <div class="sheet">
    <div class="sheet-head"><h3>환경설정</h3><button id="closeSettingBtn">닫기</button></div>
    
    <div class="field">

    </div>
    <div class="field">

  </div>
</div>

let state={
  theme: localStorage.getItem('theme') || 'light',
  timer: null,
  data: SAMPLE,
  countdown: 30,
  activeMainTab: '테마',
  activeSubFilter: '전체',
  activeSort: '기본순위',
  customFilters: JSON.parse(localStorage.getItem('customFilters')) || { '테마': [], '업종': [] },
  openIndex: null
};

const el={
  themeBtn:document.getElementById('themeBtn'),
  refreshBtn:document.getElementById('refreshBtn'),
  settingBtn:document.getElementById('settingBtn'),
  lastUpdated:document.getElementById('lastUpdated'),
  connectionStatus:document.getElementById('connectionStatus'),
  mainTabs:document.querySelectorAll('.tab'),
  subFilters:document.getElementById('subFilters'),
  sortrow:document.getElementById('sortrow'),
  sectorList:document.getElementById('sectorList'),
  topList:document.getElementById('topList'),
  overlay:document.getElementById('settingsOverlay'),
  closeSettingBtn:document.getElementById('closeSettingBtn'),
  saveSettingBtn:document.getElementById('saveSettingBtn'),
  loadSettingBtn:document.getElementById('loadSettingBtn'),
  clearSettingBtn:document.getElementById('clearSettingBtn'),
  testSettingBtn:document.getElementById('testSettingBtn'),

  prdt:document.getElementById('prdt'),

};

// 동적 컬러 생성 (문자열 해시 이용)
function getColorVar(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  const idx = (Math.abs(hash) % 8) + 1;
  return `var(--c-${idx})`;
}
function getBgVar(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  const idx = (Math.abs(hash) % 8) + 1;
  return `color-mix(in srgb, var(--c-${idx}) var(--bg-mix, 15%), var(--card))`;
}

function themeApply(t){
  document.documentElement.setAttribute('data-theme',t);
  el.themeBtn.textContent=t==='light'?'🌙':'☀️';
  localStorage.setItem('theme',t);
}

// 1차 메인 탭(테마/업종) 클릭 이벤트 연결
el.mainTabs.forEach(tab => {
  tab.onclick = (e) => {
    el.mainTabs.forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    state.activeMainTab = e.target.getAttribute('data-type');
    state.activeSubFilter = '전체'; // 탭 이동 시 서브 필터 초기화
    state.openIndex = null;
    renderAll();
  };
});

function renderSubFilters() {
  el.subFilters.innerHTML = '';
  // 현재 선택된 메인 탭의 카테고리 목록 가져오기
  const catList = state.data.categories[state.activeMainTab] || [];
  
  // 고정 1~5위
  const top5 = catList.slice(0, 5);
  // 6위 이하 중 사용자가 선택한 추가 필터
  const extras = catList.slice(5).filter(x => state.customFilters[state.activeMainTab].includes(x));
  
  const displayCats = ['전체', ...top5, ...extras];

  displayCats.forEach(x => {
    const b = document.createElement('button');
    b.className = 'filter';
    b.textContent = x;
    const active = state.activeSubFilter === x;
    
    if (active && x !== '전체') {
      b.style.background = getColorVar(x);
      b.style.color = 'var(--text-on-sec)';
      b.style.borderColor = 'transparent';
    } else if (active && x === '전체') {
      b.style.background = 'var(--accent)';
      b.style.color = 'var(--text-on-accent)';
      b.style.borderColor = 'transparent';
    } else {
      b.style.background = 'var(--chip)';
      b.style.color = 'var(--text)';
      b.style.borderColor = 'transparent';
    }

    b.onclick = () => {
      state.activeSubFilter = x;
      state.openIndex = null;
      renderAll();
    };
    el.subFilters.appendChild(b);
  });
}

function renderSorts(items){
  el.sortrow.innerHTML='';
  items.forEach(x=>{
    const b=document.createElement('button');
    b.className='sort'+(state.activeSort===x?' active':'');
    b.textContent=x;
    b.onclick=()=>{
      state.activeSort=x;
      state.openIndex=null;
      renderAll();
    };
    el.sortrow.appendChild(b);
  });
}

function num(v){
  return parseFloat(String(v).replace(/[^0-9.\\-]/g,''))||0;
}

// 필터링 및 정렬된 리스트 반환
function getFilteredAndSortedSectors() {
  // 1. 현재 메인 탭에 해당하는 종목만 필터링
  let list = state.data.sectors.filter(s => s.type === state.activeMainTab);
  
  // 2. 전체 정렬 적용 (activeSort 기준)
  const sortKey = state.activeSort;
  if (sortKey !== '기본순위') {
    const fn = {
      '거래대금': (a,b) => num(b.volume) - num(a.volume),
      '수익률': (a,b) => num(b.roi) - num(a.roi),
      '시총': (a,b) => num(b.marketCap) - num(a.marketCap),
      '변동성': (a,b) => b.name.length - a.name.length
    }[sortKey];
    if (fn) list.sort(fn);
  }

  // 3. 서브 필터가 선택된 경우, 해당 항목을 최상단으로 이동
  if (state.activeSubFilter !== '전체') {
    const selectedItems = [];
    const restItems = [];
    
    list.forEach(item => {
      if (item.sector === state.activeSubFilter) {
        selectedItems.push(item);
      } else {
        restItems.push(item);
      }
    });
    // 선택된 항목들이 위에 오고 나머지가 그 밑으로 깔림
    list = [...selectedItems, ...restItems];
  }
  
  return list;
}

function previewHTML(sec){
  return `
    <div class="item-preview">
      <div class="preview-grid">
        <div class="pbox"><div class="k">현재가 기준</div><div class="v">${sec.stocks[0].price}</div></div>
        <div class="pbox"><div class="k">등락률</div><div class="v">${sec.chg}</div></div>
        <div class="pbox"><div class="k">거래대금</div><div class="v">${sec.volume}</div></div>
        <div class="pbox"><div class="k">시가총액</div><div class="v">${sec.marketCap}</div></div>
      </div>
      <div class="preview-note">
        핵심 포인트: ${sec.reason}<br>
        관련 종목: ${sec.stocks.map(s=>s.name).join(' · ')}
      </div>
    </div>
  `;
}

function renderSectorList(){
  el.sectorList.innerHTML='';
  const items = getFilteredAndSortedSectors(); // 정렬 규칙에 따른 리스트 획득
  
  items.forEach((sec,idx)=>{
    const open=state.openIndex===idx;
    const item=document.createElement('div');
    item.className='item'+(open?' open':'');
    item.innerHTML=`
      <div class="item-main">
        <div class="rank">${idx+1}</div>
        <div class="item-info">
          <div class="row1">
            <div class="name">${sec.name}</div>
            <span class="badge">${sec.sector}</span>
          </div>
          <div class="row2">
            <span>거래대금 ${sec.volume}</span>
            <span>수익률 ${sec.roi}</span>
            <span>강도 A+</span>
          </div>
        </div>
        <div class="arrow">${open?'−':'＋'}</div>
      </div>
      ${open?previewHTML(sec):''}
    `;
    item.querySelector('.item-main').onclick=()=>{
      state.openIndex=state.openIndex===idx?null:idx;
      renderAll();
    };
    
    // 스타일 적용
    item.style.background = getBgVar(sec.sector);
    
    // 활성화된 섹터 강조
    if(state.activeSubFilter !== '전체' && sec.sector === state.activeSubFilter) {
      item.style.borderColor = getColorVar(sec.sector);
      item.style.boxShadow = `0 0 0 1px ${getColorVar(sec.sector)} inset`;
    } else {
      item.style.borderColor = 'var(--line)';
    }

    el.sectorList.appendChild(item);
  });
}

function renderTop(d){
  el.topList.innerHTML=d.top.map((x,i)=>`
    <div class="miniRow">
      <div><b>${i+1}. ${x.name}</b><div><span>${x.cat}</span></div></div>
      <div style="text-align:right"><b>${x.chg}</b><div><span>${x.vol}</span></div></div>
    </div>
  `).join('');
}

function renderSettingExtras() {
  const renderGroup = (type, containerId) => {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const list = state.data.categories[type] || [];
    // 배열 기준 5번째부터(6위부터 끝까지) 가져오기
    const rank6toEnd = list.slice(5); 

    if (rank6toEnd.length === 0) {
      container.innerHTML = '<span style="font-size:12px; color:var(--muted)">추가할 수 있는 항목이 없습니다.</span>';
      return;
    }

    rank6toEnd.forEach((cat, index) => {
      const btn = document.createElement('button');
      const isActive = state.customFilters[type].includes(cat);
      btn.className = 'pill-toggle' + (isActive ? ' active' : '');
      // 순위 표시 없이 카테고리 이름만 표시
      btn.textContent = cat;
      btn.onclick = () => {
        if (state.customFilters[type].includes(cat)) {
          state.customFilters[type] = state.customFilters[type].filter(x => x !== cat);
          btn.classList.remove('active');
        } else {
          state.customFilters[type].push(cat);
          btn.classList.add('active');
        }
      };
      container.appendChild(btn);
    });
  };

  renderGroup('테마', 'extraThemeList');
  renderGroup('업종', 'extraSectorList');
}

function showSettings(){
  el.overlay.classList.add('show');
  el.overlay.setAttribute('aria-hidden','false');
  loadConfig();
  renderSettingExtras(); // 설정 창 열릴 때 동적 6~10위 항목 생성
}
function hideSettings(){
  el.overlay.classList.remove('show');
  el.overlay.setAttribute('aria-hidden','true');
}
function saveConfig(){
  const data={
    cano:el.cano.value.trim(),
    prdt:el.prdt.value.trim(),
    appKey:el.appKey.value.trim(),
    appSecret:el.appSecret.value.trim(),
    envType:el.envType.value
  };
  localStorage.setItem('kis_config',JSON.stringify(data));
  localStorage.setItem('customFilters', JSON.stringify(state.customFilters));
  
  el.connectionStatus.textContent='설정 저장됨';
  renderAll(); // 추가된 필터 UI에 반영
}
function loadConfig(){
  const data=JSON.parse(localStorage.getItem('kis_config')||'{}');
  state.customFilters = JSON.parse(localStorage.getItem('customFilters')) || { '테마': [], '업종': [] };
  el.cano.value=data.cano||'';
  el.prdt.value=data.prdt||'';
  el.appKey.value=data.appKey||'';
  el.appSecret.value=data.appSecret||'';
  el.envType.value=data.envType||'live';
}
function clearConfig(){
  localStorage.removeItem('kis_config');
  localStorage.removeItem('customFilters');
  state.customFilters = { '테마': [], '업종': [] };
  loadConfig();
  renderSettingExtras();
  el.connectionStatus.textContent='설정 초기화';
  renderAll();
}

async function testConn(){
  el.connectionStatus.textContent='테스트중';
  try{
    const cfg=JSON.parse(localStorage.getItem('kis_config')||'{}');
    if(!cfg.appKey||!cfg.appSecret) throw new Error('missing');
    const r=await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://api.github.com'),{cache:'no-store'});
    if(!r.ok) throw new Error('network');
    el.connectionStatus.textContent='연결 시도 성공';
  }catch(e){
    el.connectionStatus.textContent='입력 확인 필요';
  }
}

async function fetchReal(){
  el.connectionStatus.textContent='불러오는중';
  try{
    await fetch('https://api.allorigins.win/raw?url='+encodeURIComponent('https://query1.finance.yahoo.com/v7/finance/quote?symbols=^KS11,005930.KS,000660.KS'),{cache:'no-store'});
    state.data=SAMPLE;
    el.connectionStatus.textContent='실데이터 시도됨';
  }catch(e){
    state.data=SAMPLE;
    el.connectionStatus.textContent='샘플 데이터 표시';
  }
  state.countdown=30;
  renderAll();
  el.lastUpdated.textContent='최종 갱신: '+new Date().toLocaleTimeString('ko-KR');
}

function renderAll(){
  renderSubFilters();
  renderSorts(state.data.sorts);
  renderSectorList();
  renderTop(state.data);
  el.refreshBtn.textContent='⏳ '+state.countdown;
}

function poll(){
  clearInterval(state.timer);
  state.timer=setInterval(()=>{
    state.countdown=Math.max(0,state.countdown-1);
    el.refreshBtn.textContent='⏳ '+state.countdown;
    if(state.countdown<=0) fetchReal();
  },1000);
}

el.themeBtn.onclick=()=>themeApply(state.theme=state.theme==='light'?'dark':'light');
el.refreshBtn.onclick=fetchReal;
el.settingBtn.onclick=showSettings;
el.closeSettingBtn.onclick=hideSettings;
el.overlay.addEventListener('click',e=>{if(e.target===el.overlay) hideSettings()});
el.saveSettingBtn.onclick=saveConfig;
el.loadSettingBtn.onclick=loadConfig;
el.clearSettingBtn.onclick=clearConfig;
el.testSettingBtn.onclick=testConn;

themeApply(state.theme);
loadConfig();
fetchReal();
poll();
</script>
