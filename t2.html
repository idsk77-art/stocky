<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>주도섹터 앱</title>
<style>
:root{--bg:#f6f8fc;--card:#fff;--text:#0f172a;--muted:#475569;--line:#dbe3ef;--accent:#111827;--accent2:#2563eb;--shadow:0 8px 24px rgba(15,23,42,.08);--radius:20px;--chip:#eef4ff;--preview:rgba(255,255,255,.76);--preview2:rgba(255,255,255,.92);--text2:#0b1220}
html[data-theme="dark"]{--bg:#0b1220;--card:#111827;--text:#f8fafc;--muted:#cbd5e1;--line:#3b4b61;--accent:#f8fafc;--accent2:#93c5fd;--shadow:0 10px 26px rgba(0,0,0,.36);--chip:#1b2940;--preview:rgba(15,23,42,.82);--preview2:rgba(15,23,42,.94);--text2:#f8fafc}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding:12px 12px 16px;display:flex;flex-direction:column;gap:12px}
.topbar{display:flex;flex-direction:column;gap:10px;padding-top:2px}.topline{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}.title h1{margin:0;font-size:22px;letter-spacing:-.03em;line-height:1.1}.title p{margin:6px 0 0;color:var(--muted);font-size:12px;line-height:1.4}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;justify-content:flex-end;white-space:nowrap}
button{border:0;border-radius:999px;padding:10px 13px;font-weight:800;font-size:12px;cursor:pointer;color:var(--text);background:var(--card);box-shadow:var(--shadow);border:1px solid var(--line)}button.primary{background:var(--accent);color:var(--bg);border-color:transparent}.iconbtn{width:40px;height:40px;padding:0;display:grid;place-items:center;border-radius:50%}
.status{display:flex;justify-content:space-between;gap:10px;font-size:11px;color:var(--muted);padding:0 2px}.status div{color:var(--muted)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-h{padding:14px 14px 0;display:flex;justify-content:space-between;align-items:center;gap:10px}.card-h h2{margin:0;font-size:15px;color:var(--text)}.pill{font-size:11px;padding:6px 9px;border-radius:999px;background:rgba(37,99,235,.1);color:var(--accent2);font-weight:700}
.filters,.sortrow{display:flex;gap:8px;overflow:auto;padding:12px 14px 0;scrollbar-width:none}.filters::-webkit-scrollbar,.sortrow::-webkit-scrollbar{display:none}
.filter,.sort{white-space:nowrap;padding:9px 13px;border-radius:999px;border:1px solid transparent;font-size:12px;font-weight:800;box-shadow:none}.filter{color:var(--text2)}.sort{background:var(--chip);border-color:var(--line);color:var(--text)}.sort.active{background:var(--accent);color:var(--bg);border-color:transparent}
.list{display:flex;flex-direction:column;gap:10px;padding:12px 14px 14px}
.item{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--card);box-shadow:0 4px 14px rgba(15,23,42,.05)}
.item-main{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px;cursor:pointer}.rank{width:32px;height:32px;border-radius:10px;background:var(--chip);display:grid;place-items:center;font-size:12px;font-weight:900;color:var(--text)}
.item-info{min-width:0}.item-info .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}.item-info .name{font-size:15px;font-weight:900;letter-spacing:-.02em;color:var(--text)}.badge{font-size:11px;padding:4px 8px;border-radius:999px;background:var(--chip);color:var(--muted);border:1px solid var(--line)}
.item-info .row2{margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px}.arrow{width:34px;height:34px;border-radius:50%;background:var(--chip);display:grid;place-items:center;font-weight:900;border:1px solid var(--line);color:var(--text)}
.item.open .item-preview{display:block}.item-preview{display:none;border-top:1px solid var(--line);background:var(--preview);padding:12px}.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}.pbox{background:var(--preview2);border:1px solid var(--line);border-radius:14px;padding:10px}.pbox .k{font-size:11px;color:var(--muted);margin-bottom:5px}.pbox .v{font-size:14px;font-weight:800;letter-spacing:-.01em;color:var(--text)}.preview-note{margin-top:10px;font-size:12px;color:var(--muted);line-height:1.5}
.miniList{display:flex;flex-direction:column;gap:8px;padding:14px}.miniRow{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:11px 12px;border-radius:16px;background:color-mix(in srgb, var(--card) 72%, var(--bg));border:1px solid var(--line)}.miniRow b{font-size:14px;color:var(--text)}.miniRow span{font-size:12px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);display:none;align-items:flex-end;justify-content:center;z-index:30}.overlay.show{display:flex}.sheet{width:min(430px,100%);background:var(--card);border-radius:24px 24px 0 0;border:1px solid var(--line);box-shadow:0 -16px 32px rgba(0,0,0,.22);padding:14px;max-height:85vh;overflow:auto}.sheet-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.sheet-head h3{margin:0;font-size:16px;color:var(--text)}.field{margin-bottom:12px}.field label{display:block;font-size:12px;font-weight:800;margin:0 0 6px;color:var(--text)}.field input,.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:transparent;color:var(--text);font-size:14px;outline:none}.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}.warn{border-left:4px solid #f59e0b;background:rgba(245,158,11,.08);padding:10px 12px;border-radius:14px;margin-top:12px;color:var(--text);font-size:12px;line-height:1.45}.footer{color:var(--muted);text-align:center;font-size:11px;padding-top:2px}
@media (max-width:390px){.item-main{grid-template-columns:auto 1fr}.arrow{display:none}.title h1{font-size:20px}}
</style>
</head>

        </button>
      </div>
    </div>
    <div class="status"><div id="lastUpdated">업데이트 대기중</div><div id="connectionStatus">연결 확인중</div></div>
  </div>
  <div class="card">
    <div class="card-h"><h2>주도섹터 페이지</h2><span class="pill">테마/업종 + 10위 확장</span></div>
    <div class="filters" id="filters"></div>
    <div class="sortrow" id="sortrow"></div>
    <div class="list" id="sectorList"></div>
  </div>
  <div class="card"><div class="card-h"><h2>실시간 상위 종목</h2><span class="pill">웹 데이터</span></div><div class="miniList" id="topList"></div></div>
  <div class="footer">실데이터가 실패하면 샘플 데이터로 자동 대체</div>
</div>
<div class="overlay" id="settingsOverlay" aria-hidden="true">
  <div class="sheet">
    <div class="sheet-head"><h3>환경설정</h3><button id="closeSettingBtn">닫기</button></div>
    <div class="field"><label>계좌번호</label><input id="cano" placeholder="예: 44614025" /></div>
    <div class="field"><label>상품코드</label><input id="prdt" placeholder="예: 01" /></div>
    <div class="field"><label>App Key</label><input id="appKey" placeholder="API Key 입력" /></div>
    <div class="field"><label>App Secret</label><input id="appSecret" placeholder="API Secret 입력" /></div>
    <div class="field"><label>환경</label><select id="envType"><option value="live">실계좌</option><option value="paper">모의투자</option></select></div>
    <div class="field"><label>최대 노출 수</label><select id="maxItems"><option value="5">5개</option><option value="10">10개</option></select></div>
    <div class="btnrow"><button id="saveSettingBtn" class="primary">저장</button><button id="loadSettingBtn">불러오기</button><button id="clearSettingBtn">초기화</button><button id="testSettingBtn">연결 테스트</button></div>
    <div class="warn">민감정보는 브라우저 저장보다 서버 토큰 구조가 안전하다.</div>
  </div>
</div>
