<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>주도섹터 앱</title>
<style>
:root{
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --line: #e2e8f0;
  --accent: #0f172a;
  --text-on-accent: #ffffff;
  --accent2: #2563eb;
  --shadow: 0 8px 24px rgba(15,23,42,.06);
  --radius: 20px;
  --chip: #f1f5f9;
  --preview: #f8fafc;
  --preview2: #ffffff;
  --bg-mix: 15%;
  --c-1: #93c5fd; --c-2: #fca5a5; --c-3: #fde047; --c-4: #86efac;
  --c-5: #d8b4fe; --c-6: #fdba74; --c-7: #67e8f9; --c-8: #f9a8d4;
  --text-on-sec: #0f172a;
}
html[data-theme="dark"]{
  --bg: #0f172a;
  --card: #1e293b;
  --text: #f8fafc;
  --muted: #94a3b8;
  --line: #334155;
  --accent: #3b82f6; 
  --text-on-accent: #ffffff;
  --accent2: #60a5fa;
  --shadow: 0 10px 26px rgba(0,0,0,.4);
  --chip: #334155;
  --preview: #0f172a;
  --preview2: #1e293b;
  --bg-mix: 25%;
  --c-1: #60a5fa; --c-2: #f87171; --c-3: #fde047; --c-4: #4ade80;
  --c-5: #c084fc; --c-6: #fb923c; --c-7: #22d3ee; --c-8: #f472b6;
  --text-on-sec: #0f172a;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
  transition: background-color 0.2s, color 0.2s;
}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding:12px 12px 16px;
  display:flex;
  flex-direction:column;
  gap:12px
}
