<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>주도섹터 앱</title>
<style>
:root{
  --bg:#f8fafc; --card:#fff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --accent:#0f172a; --text-on-accent:#fff; --accent2:#2563eb; --shadow:0 8px 24px rgba(15,23,42,.06);
  --radius:20px; --chip:#f1f5f9; --preview:#f8fafc; --preview2:#fff; --bg-mix:15%;
  --c-1:#93c5fd; --c-2:#fca5a5; --c-3:#fde047; --c-4:#86efac; --c-5:#d8b4fe; --c-6:#fdba74; --c-7:#67e8f9; --c-8:#f9a8d4;
  --text-on-sec:#0f172a;
}
html[data-theme="dark"]{
  --bg:#0f172a; --card:#1e293b; --text:#f8fafc; --muted:#94a3b8; --line:#334155;
  --accent:#3b82f6; --text-on-accent:#fff; --accent2:#60a5fa; --shadow:0 10px 26px rgba(0,0,0,.4);
  --chip:#334155; --preview:#0f172a; --preview2:#1e293b; --bg-mix:25%;
  --c-1:#60a5fa; --c-2:#f87171; --c-3:#fde047; --c-4:#4ade80; --c-5:#c084fc; --c-6:#fb923c; --c-7:#22d3ee; --c-8:#f472b6;
  --text-on-sec:#0f172a;
}
*{box-sizing:border-box}
body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,Segoe UI,Noto Sans KR,sans-serif;background:var(--bg);color:var(--text)}
.app{max-width:430px;margin:0 auto;min-height:100vh;padding:12px 12px 16px;display:flex;flex-direction:column;gap:12px}
.topbar{display:flex;flex-direction:column;gap:10px;padding-top:2px}
.topline{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.title h1{margin:0;font-size:22px;letter-spacing:-.03em;line-height:1.1}
.actions{display:flex;gap:8px;align-items:center;flex-wrap:nowrap;justify-content:flex-end}
button{border:0;border-radius:999px;padding:10px 13px;font-weight:800;font-size:12px;cursor:pointer;color:var(--text);background:var(--card);box-shadow:var(--shadow);border:1px solid var(--line);transition:all .15s}
button:active{transform:scale(.96)}
button.primary{background:var(--accent);color:var(--text-on-accent);border-color:transparent}
.iconbtn{width:40px;height:40px;padding:0;display:grid;place-items:center;border-radius:50%}
.status{display:flex;justify-content:flex-end;gap:12px;font-size:11px;color:var(--muted);padding:0 2px;transition:color .2s;flex-wrap:wrap}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
.card-h{padding:14px 14px 0;display:flex;justify-content:space-between;align-items:center;gap:10px}
.card-h h2{margin:0;font-size:15px}
.pill{font-size:11px;padding:6px 9px;border-radius:999px;background:rgba(37,99,235,.1);color:var(--accent2);font-weight:700}
.tabs{display:flex;gap:8px;padding:14px 14px 0}
.tab{flex:1;text-align:center;padding:10px;border-radius:12px;font-size:13px;font-weight:800;background:var(--chip);color:var(--muted);box-shadow:none}
.tab.active{background:var(--accent);color:var(--text-on-accent);border-color:transparent}
.filters,.sortrow{display:flex;gap:8px;overflow:auto;padding:12px 14px 0}
.filters::-webkit-scrollbar,.sortrow::-webkit-scrollbar{display:none}
.filter,.sort{white-space:nowrap;padding:9px 13px;border-radius:999px;border:1px solid transparent;font-size:12px;font-weight:800;color:var(--text);box-shadow:none}
.sort{background:var(--chip);border-color:var(--line)}
.sort.active,.filter.active{background:var(--accent);color:var(--text-on-accent);border-color:transparent}
.list{display:flex;flex-direction:column;gap:10px;padding:12px 14px 14px}
.item{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--card);box-shadow:0 4px 14px rgba(0,0,0,.03)}
html[data-theme="dark"] .item{box-shadow:0 4px 14px rgba(0,0,0,.2)}
.item-main{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px;cursor:pointer}
.rank{width:32px;height:32px;border-radius:10px;background:color-mix(in srgb, var(--text) 10%, transparent);display:grid;place-items:center;font-size:12px;font-weight:900;color:var(--text)}
.item-info{min-width:0}
.item-info .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.item-info .name{font-size:15px;font-weight:900;letter-spacing:-.02em;color:var(--text)}
.badge{font-size:11px;padding:4px 8px;border-radius:999px;background:color-mix(in srgb, var(--text) 8%, transparent);color:var(--text);border:1px solid color-mix(in srgb, var(--text) 15%, transparent)}
.item-info .row2{margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px}
.arrow{width:34px;height:34px;border-radius:50%;background:color-mix(in srgb, var(--text) 5%, transparent);display:grid;place-items:center;font-weight:900;border:1px solid var(--line)}
.item.open .item-preview{display:block}
.item-preview{display:none;border-top:1px solid var(--line);background:var(--preview);padding:12px}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pbox{background:var(--preview2);border:1px solid var(--line);border-radius:14px;padding:10px}
.pbox .k{font-size:11px;color:var(--muted);margin-bottom:5px}
.pbox .v{font-size:14px;font-weight:800;letter-spacing:-.01em;color:var(--text)}
.preview-note{margin-top:10px;font-size:12px;color:var(--text);line-height:1.5}
.miniList{display:flex;flex-direction:column;gap:8px;padding:14px}
.miniRow{display:flex;justify-content:space-between;gap:8px;align-items:center;padding:11px 12px;border-radius:16px;background:var(--chip);border:1px solid var(--line)}
.miniRow b{font-size:14px;color:var(--text)}
.miniRow span{font-size:12px;color:var(--muted)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:30}
.overlay.show{display:flex}
.sheet{width:min(430px,100%);background:var(--card);border-radius:24px 24px 0 0;border:1px solid var(--line);box-shadow:0 -16px 32px rgba(0,0,0,.3);padding:14px;max-height:85vh;overflow:auto}
.sheet-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}
.sheet-head h3{margin:0;font-size:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:800;margin:0 0 6px}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px 14px;background:var(--bg);color:var(--text);font-size:14px;outline:none}
.field input:focus,.field select:focus{border-color:var(--accent2)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.pill-toggle{padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:var(--chip);color:var(--text);font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:none}
.pill-toggle.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
.api-saved-card{display:none;padding:16px;background:var(--chip);border-radius:14px;margin-bottom:12px;border:1px solid var(--line)}
.api-table{width:100%;font-size:12px;border-collapse:collapse}
.api-table td{padding:6px 0;color:var(--text)}
.api-table td:first-child{color:var(--muted);width:80px}
.api-table td:last-child{font-weight:700;text-align:right}
.warn{border-left:4px solid #f59e0b;background:rgba(245,158,11,.1);padding:10px 12px;border-radius:14px;margin-top:12px;color:var(--text);font-size:12px;line-height:1.45}
.footer{color:var(--muted);text-align:center;font-size:11px;padding-top:2px}
@media(max-width:390px){.item-main{grid-template-columns:auto 1fr}.arrow{display:none}.title h1{font-size:20px}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topline">
      <div class="title"><h1>주도섹터 앱</h1></div>
      <div class="actions">
        <button id="themeBtn" class="iconbtn" aria-label="theme">☾</button>
        <button id="refreshBtn" class="primary" aria-label="refresh">30</button>
        <button id="settingBtn" class="iconbtn" aria-label="settings">⚙</button>
      </div>
    </div>
    <div class="status">
      <div id="lastUpdated">최종 갱신: -</div>
      <div id="connectionStatus">연결 대기중</div>
    </div>
  </div>

  <div class="card">
    <div class="tabs" id="mainTabs">
      <button class="tab active" data-type="테마">테마</button>
      <button class="tab" data-type="업종">업종</button>
    </div>
    <div class="filters" id="subFilters"></div>
    <div class="sortrow" id="sortrow"></div>
    <div class="list" id="sectorList"></div>
  </div>

  <div class="card">
    <div class="card-h"><h2>상위 종목</h2><span class="pill">TOP</span></div>
    <div class="miniList" id="topList"></div>
  </div>

  <div class="footer">관리자 1회 저장 후 모든 사용자가 공용 API를 사용</div>
</div>

<div class="overlay" id="settingsOverlay" aria-hidden="true">
  <div class="sheet">
    <div class="sheet-head">
      <h3>설정</h3>
      <button id="closeSettingBtn">닫기</button>
    </div>

    <div id="apiSavedGroup" class="api-saved-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:14px;font-weight:800;color:var(--text)">공용 API 상태</span>
        <button id="editApiBtn" style="padding:6px 12px;font-size:12px">수정</button>
      </div>
      <table class="api-table">
        <tr><td>계좌</td><td id="dispCano">-</td></tr>
        <tr><td>App Key</td><td id="dispAppKey">-</td></tr>
        <tr><td>환경</td><td id="dispEnv">-</td></tr>
      </table>
    </div>

    <div id="apiFormGroup">
      <div class="field"><label>계좌</label><input type="text" id="cano" placeholder="44614025"></div>
      <div class="field"><label>상품코드</label><input type="text" id="prdt" placeholder="01"></div>
      <div class="field"><label>App Key</label><input type="password" id="appKey" placeholder="API Key"></div>
      <div class="field"><label>App Secret</label><input type="password" id="appSecret" placeholder="API Secret"></div>
      <div class="field">
        <label>환경</label>
        <select id="envType">
          <option value="live">실계좌</option>
          <option value="paper">모의투자</option>
        </select>
      </div>
      <div class="btnrow">
        <button id="testSettingBtn" class="primary" style="flex:1">연결 확인</button>
      </div>
      <div class="btnrow" style="margin-top:10px">
        <button id="clearSettingBtn" style="width:100%">초기화</button>
      </div>
      <div class="warn"><b>주의</b><br>실제 운영에서는 App Secret을 프론트엔드에 직접 두지 말고 서버 프록시에서 관리해야 안전합니다.</div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
import { getFirestore, doc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

const SERVER_API_BASE = 'https://YOUR-SERVER-DOMAIN.com';
const firebaseConfig = typeof firebaseconfig !== 'undefined' ? JSON.parse(firebaseconfig) : {};
const appId = typeof appid !== 'undefined' ? appid : 'default-app-id';
let app=null, auth=null, db=null;
if(Object.keys(firebaseConfig).length>0){ app=initializeApp(firebaseConfig); auth=getAuth(app); db=getFirestore(app); }

const SAMPLE={categories:{'테마':['AI','2차전지','반도체','바이오','로봇'], '업종':['IT','소재','금융','에너지','헬스케어']},sorts:['volume','roi','marketCap'],sectors:[{type:'테마',name:'AI',sector:'AI',reason:'수요 확대',chg:'29.9',volume:'5,362',marketCap:'1.6',roi:'29.9',stocks:[{name:'A',price:'102,000',chg:'29.9'},{name:'B',price:'11,900',chg:'8.1'}]},{type:'테마',name:'2차전지',sector:'2차전지',reason:'배터리 기대감',chg:'8.5',volume:'8.7',marketCap:'38',roi:'12.5',stocks:[{name:'C',price:'121,000',chg:'12.5'},{name:'D',price:'238,000',chg:'11.2'}]},{type:'업종',name:'IT',sector:'IT',reason:'클라우드',chg:'6.8',volume:'4.1',marketCap:'24',roi:'4.1',stocks:[{name:'E',price:'287,000',chg:'4.5'},{name:'F',price:'105,000',chg:'5.2'}]}],top:[{name:'MLCC',cat:'AI',chg:'29.9',vol:'5,362'},{name:'ESS',cat:'2차전지',chg:'12.5',vol:'8.7'},{name:'HBM',cat:'반도체',chg:'9.7',vol:'12.5'}]};

let state={theme:localStorage.getItem('theme')||'light',timer:null,data:SAMPLE,countdown:30,activeMainTab:'테마',activeSubFilter:'',activeSort:'volume',filterCount:5,customFilters:{'테마':[],'업종':[]},openIndex:null};
let stored={cano:'',prdt:'',envType:'live',appKey:'',isReady:false,lastSync:'-'}; 
let isApiConnected=false;

const el={themeBtn:document.getElementById('themeBtn'),refreshBtn:document.getElementById('refreshBtn'),settingBtn:document.getElementById('settingBtn'),lastUpdated:document.getElementById('lastUpdated'),connectionStatus:document.getElementById('connectionStatus'),mainTabs:document.querySelectorAll('.tab'),subFilters:document.getElementById('subFilters'),sortrow:document.getElementById('sortrow'),sectorList:document.getElementById('sectorList'),topList:document.getElementById('topList'),overlay:document.getElementById('settingsOverlay'),closeSettingBtn:document.getElementById('closeSettingBtn'),testSettingBtn:document.getElementById('testSettingBtn'),clearSettingBtn:document.getElementById('clearSettingBtn'),editApiBtn:document.getElementById('editApiBtn'),apiFormGroup:document.getElementById('apiFormGroup'),apiSavedGroup:document.getElementById('apiSavedGroup'),dispCano:document.getElementById('dispCano'),dispAppKey:document.getElementById('dispAppKey'),dispEnv:document.getElementById('dispEnv'),cano:document.getElementById('cano'),prdt:document.getElementById('prdt'),appKey:document.getElementById('appKey'),appSecret:document.getElementById('appSecret'),envType:document.getElementById('envType')};

function maskKey(v){ if(!v) return ''; if(v.length<=4) return '*'.repeat(v.length); return v.substring(0,4)+'*'.repeat(v.length-4); }
function themeApply(t){ document.documentElement.setAttribute('data-theme',t); el.themeBtn.textContent=t==='light'?'☾':'☀'; localStorage.setItem('theme',t); }

function setStatus(text, color=''){ el.connectionStatus.textContent=text; el.connectionStatus.style.color=color; }
function renderApiUI(){
  el.apiSavedGroup.style.display='block';
  el.apiFormGroup.style.display='none';
  el.dispCano.textContent=stored.cano||'-';
  el.dispAppKey.textContent=stored.appKey?maskKey(stored.appKey):'-';
  el.dispEnv.textContent=stored.envType==='live'?'실계좌':'모의투자';
  setStatus(isApiConnected?'✅ API 정상 연결':'❌ API 연결 실패', isApiConnected?'#10b981':'#ef4444');
}
function showSettings(){ el.overlay.classList.add('show'); el.overlay.setAttribute('aria-hidden','false'); }
function hideSettings(){ el.overlay.classList.remove('show'); el.overlay.setAttribute('aria-hidden','true'); }

async function saveConfigToCloud(){
  if(db && auth && auth.currentUser){
    const docRef=doc(db,'artifacts',appId,'public','data','global_config');
    await setDoc(docRef,{...stored,customFilters:state.customFilters,filterCount:state.filterCount,isApiConnected});
  }
}

async function loadConfigFromCloud(){
  if(!auth || !db) return;
  return new Promise((resolve)=>{
    onAuthStateChanged(auth, user=>{
      if(user && db){
        const docRef=doc(db,'artifacts',appId,'public','data','global_config');
        onSnapshot(docRef,snap=>{
          if(snap.exists()){
            const d=snap.data();
            stored.cano=d.cano||'';
            stored.prdt=d.prdt||'';
            stored.envType=d.envType||'live';
            stored.appKey=d.appKey||'';
            isApiConnected=d.isApiConnected===true;
            state.filterCount=parseInt(d.filterCount)||5;
            state.customFilters=d.customFilters||{'테마':[],'업종':[]};
            el.envType.value=stored.envType;
            renderApiUI();
            renderAll();
          }
          resolve();
        });
      } else resolve();
    });
  });
}

async function testConn(){
  setStatus('테스트중...');
  try{
    const res = await fetch(`${SERVER_API_BASE}/api/status`, { method:'GET' });
    const data = await res.json();
    if(!res.ok || !data.ok) throw new Error(data.message || '연결 실패');
    isApiConnected = true;
    stored.cano = el.cano.value.trim() || stored.cano;
    stored.prdt = el.prdt.value.trim() || stored.prdt;
    stored.envType = el.envType.value;
    stored.appKey = el.appKey.value.trim() || stored.appKey;
    await saveConfigToCloud();
    renderApiUI();
    setStatus('✅ 서버 연결 성공', '#10b981');
  }catch(e){
    isApiConnected = false;
    await saveConfigToCloud();
    renderApiUI();
    setStatus('❌ '+e.message, '#ef4444');
  }
  setTimeout(()=>{ if(isApiConnected) setStatus('연결 양호'); }, 3000);
}

async function fetchApiData(){
  try{
    const res = await fetch(`${SERVER_API_BASE}/api/market-data?env=${encodeURIComponent(stored.envType)}`);
    const data = await res.json();
    if(!res.ok || !data.ok) throw new Error(data.message || '데이터 실패');
    state.data = data.payload;
    isApiConnected = true;
    renderApiUI();
    setStatus('✅ API 데이터 갱신', '#10b981');
  }catch(e){
    state.data = SAMPLE;
    isApiConnected = false;
    renderApiUI();
    setStatus('⚠️ API 미연결 - 샘플 데이터', '#f59e0b');
  }
  state.countdown = 30;
  renderAll();
  el.lastUpdated.textContent = '최종 갱신: ' + new Date().toLocaleTimeString('ko-KR');
  await saveConfigToCloud();
}

function renderSubFilters(){
  el.subFilters.innerHTML='';
  const list=(state.data.categories[state.activeMainTab]||[]).slice(0,state.filterCount);
  list.forEach(x=>{
    const b=document.createElement('button');
    b.className='filter'+(state.activeSubFilter===x?' active':'');
    b.textContent=x;
    b.onclick=()=>{ state.activeSubFilter=state.activeSubFilter===x?'':x; renderAll(); };
    el.subFilters.appendChild(b);
  });
}
function renderSorts(){
  el.sortrow.innerHTML='';
  (state.data.sorts||[]).forEach(x=>{
    const b=document.createElement('button');
    b.className='sort'+(state.activeSort===x?' active':'');
    b.textContent=x;
    b.onclick=()=>{ state.activeSort=x; renderAll(); };
    el.sortrow.appendChild(b);
  });
}
function renderSectorList(){
  el.sectorList.innerHTML='';
  (state.data.sectors||[]).filter(s=>s.type===state.activeMainTab).forEach((sec,idx)=>{
    const item=document.createElement('div');
    item.className='item'+(state.openIndex===idx?' open':'');
    item.innerHTML=`<div class="item-main"><div class="rank">${idx+1}</div><div class="item-info"><div class="row1"><div class="name">${sec.name}</div><span class="badge">${sec.sector}</span></div><div class="row2"><span>${sec.volume}</span><span>${sec.roi}</span><span>${sec.chg}%</span></div></div><div class="arrow">${state.openIndex===idx?'−':'+'}</div></div><div class="item-preview"><div class="preview-grid"><div class="pbox"><div class="k">대표주가</div><div class="v">${sec.stocks?.[0]?.price||'-'}</div></div><div class="pbox"><div class="k">변동률</div><div class="v">${sec.chg}%</div></div></div><div class="preview-note">${sec.reason}</div></div>`;
    item.querySelector('.item-main').onclick=()=>{ state.openIndex=state.openIndex===idx?null:idx; renderAll(); };
    el.sectorList.appendChild(item);
  });
}
function renderTop(){
  el.topList.innerHTML='';
  (state.data.top||[]).forEach((x,i)=>{
    const d=document.createElement('div');
    d.className='miniRow';
    d.innerHTML=`<div><b>${i+1}. ${x.name}</b></div><span>${x.cat}</span><div style="text-align:right"><b>${x.chg}%</b><br><span>${x.vol}</span></div>`;
    el.topList.appendChild(d);
  });
}
function renderAll(){ renderSubFilters(); renderSorts(); renderSectorList(); renderTop(); el.refreshBtn.textContent='⏳ '+state.countdown; }

function poll(){
  clearInterval(state.timer);
  state.timer=setInterval(()=>{
    state.countdown=Math.max(0,state.countdown-1);
    el.refreshBtn.textContent='⏳ '+state.countdown;
    if(state.countdown<=0) fetchApiData();
  },1000);
}

el.mainTabs.forEach(tab=>tab.onclick=e=>{
  el.mainTabs.forEach(t=>t.classList.remove('active'));
  e.target.classList.add('active');
  state.activeMainTab=e.target.getAttribute('data-type');
  state.activeSubFilter='';
  state.openIndex=null;
  renderAll();
});

el.themeBtn.onclick=()=>themeApply(state.theme=state.theme==='light'?'dark':'light');
el.refreshBtn.onclick=fetchApiData;
el.settingBtn.onclick=showSettings;
el.closeSettingBtn.onclick=hideSettings;
el.overlay.addEventListener('click',e=>{ if(e.target===el.overlay) hideSettings(); });
el.clearSettingBtn.onclick=async()=>{
  stored={cano:'',prdt:'',envType:'live',appKey:'',isReady:false,lastSync:'-'};
  isApiConnected=false;
  el.cano.value='';
  el.prdt.value='';
  el.appKey.value='';
  el.appSecret.value='';
  el.envType.value='live';
  await saveConfigToCloud();
  renderApiUI();
};
el.testSettingBtn.onclick=async()=>{
  stored.cano=el.cano.value.trim();
  stored.prdt=el.prdt.value.trim();
  stored.envType=el.envType.value;
  stored.appKey=el.appKey.value.trim();
  await testConn();
};

themeApply(state.theme);

async function init(){
  if(auth){
    if(typeof __initial_auth_token!=='undefined' && __initial_auth_token) await signInWithCustomToken(auth,__initial_auth_token);
    else await signInAnonymously(auth);
    await loadConfigFromCloud();
  }
  renderApiUI();
  await fetchApiData();
  poll();
}
init();
</script>
</body>
</html>
