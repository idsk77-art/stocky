<!doctype html>
<html lang="ko" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>주도섹터</title>
  <style>
    :root{
      --bg:#f8fafc; --card:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --accent:#111827; --good:#10b981; --warn:#f59e0b; --bad:#ef4444;
      --shadow:0 8px 24px rgba(15,23,42,.06); --radius:20px;
      --chip:#f1f5f9; --preview:#f8fafc; --preview2:#ffffff;
      --c-1:#93c5fd; --c-2:#fca5a5; --c-3:#fde047; --c-4:#86efac;
      --c-5:#d8b4fe; --c-6:#fdba74; --c-7:#67e8f9; --c-8:#f9a8d4;
    }
    html[data-theme="dark"]{
      --bg:#0d0d0d; --card:#1a1a1a; --text:#e5e7eb; --muted:#9ca3af; --line:#2c2c2c;
      --accent:#e5e7eb; --chip:#222222; --preview:#131313; --preview2:#242424;
      --shadow:0 10px 26px rgba(0,0,0,.55);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);transition:background .2s,color .2s}
    button{font:inherit;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:999px;padding:10px 13px;font-weight:800;cursor:pointer;box-shadow:none}
    button:active{transform:scale(.97)}

    .app{max-width:430px;margin:0 auto;min-height:100vh;padding:12px 12px 16px;display:flex;flex-direction:column;gap:12px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}

    .topbar{display:flex;flex-direction:column;gap:10px;padding-top:2px}
    .topline{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .titlebox h1{margin:0;font-size:20px;font-weight:900}
    .iconbtn{width:34px;height:34px;padding:0;display:grid;place-items:center}

    .status-card{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;padding:12px 14px}
    .status-left{display:flex;flex-direction:column;gap:4px;min-width:0}
    .status-main{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:900}
    .status-pill{padding:4px 8px;border-radius:999px;font-size:11px;font-weight:900;border:1px solid transparent}
    .status-pill.real{background:rgba(16,185,129,.12);color:var(--good);border-color:rgba(16,185,129,.3)}
    .status-pill.waiting{background:rgba(245,158,11,.12);color:var(--warn);border-color:rgba(245,158,11,.3)}
    .status-pill.error{background:rgba(239,68,68,.12);color:var(--bad);border-color:rgba(239,68,68,.35)}
    .status-time{font-size:12px;color:var(--muted)}
    .live-box{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);font-weight:800}
    .status-indicator{width:10px;height:10px;border-radius:50%;display:inline-block;background:#555}
    .status-indicator.green{background:var(--good);box-shadow:0 0 6px var(--good)}
    .status-indicator.yellow{background:var(--warn);box-shadow:0 0 6px var(--warn)}
    .status-indicator.red{background:var(--bad);box-shadow:0 0 6px var(--bad)}

    /* 가로 스크롤 - 얇은 스크롤바로 존재 암시 */
    .filters,.sortrow{
      display:flex;gap:8px;overflow-x:auto;padding:14px 14px 10px;
      scrollbar-width:thin;
      scrollbar-color:color-mix(in srgb,var(--muted) 35%,transparent) transparent;
      -webkit-overflow-scrolling:touch;
    }
    .filters::-webkit-scrollbar,.sortrow::-webkit-scrollbar{height:3px}
    .filters::-webkit-scrollbar-track,.sortrow::-webkit-scrollbar-track{background:transparent}
    .filters::-webkit-scrollbar-thumb,.sortrow::-webkit-scrollbar-thumb{background:color-mix(in srgb,var(--muted) 35%,transparent);border-radius:4px}

    .filter,.sort{white-space:nowrap;padding:9px 13px;border-radius:999px;border:1px solid transparent;font-size:12px;font-weight:800;color:var(--text);background:var(--chip)}
    .sort{border-color:var(--line)}
    .sort.active{background:var(--accent);color:var(--bg);border-color:transparent}

    .theme-summary{padding:12px 14px 0;display:none}
    .summary-card{background:var(--preview2);border:1px solid var(--line);border-radius:14px;padding:12px}
    .summary-title{font-size:14px;font-weight:900;margin-bottom:4px}
    .summary-desc{font-size:12px;color:var(--muted);margin-bottom:8px}
    .summary-stats{display:flex;gap:12px;font-size:12px;font-weight:800;flex-wrap:wrap}

    .list{display:flex;flex-direction:column;gap:10px;padding:12px 14px 14px}

    /* 스켈레톤 */
    .skeleton-item{border:1px solid var(--line);border-radius:18px;padding:14px 12px;display:flex;align-items:center;gap:10px}
    .sk-rank{width:32px;height:32px;border-radius:10px;background:var(--chip);flex-shrink:0}
    .sk-body{flex:1;display:flex;flex-direction:column;gap:8px}
    .sk-line{height:12px;border-radius:6px;background:var(--chip)}
    .sk-line.wide{width:55%}
    .sk-line.narrow{width:35%}
    @keyframes shimmer{0%,100%{opacity:1}50%{opacity:.4}}
    .skeleton-item{animation:shimmer 1.4s ease-in-out infinite}

    .item{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--card)}
    .item-main{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:center;padding:12px;cursor:pointer}
    .rank{width:32px;height:32px;border-radius:10px;background:color-mix(in srgb,var(--text) 10%,transparent);display:grid;place-items:center;font-size:12px;font-weight:900}
    .item-info{min-width:0}
    .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .name{font-size:15px;font-weight:900;letter-spacing:-.02em}
    .badge{font-size:11px;padding:4px 8px;border-radius:999px;font-weight:800;border:1px solid var(--line)}
    .row2{margin-top:4px;display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:12px;font-weight:600}
    .arrow{width:34px;height:34px;border-radius:50%;background:color-mix(in srgb,var(--text) 5%,transparent);display:grid;place-items:center;font-weight:900;border:1px solid var(--line);flex-shrink:0}

    .item-preview{display:none;border-top:1px solid var(--line);background:var(--preview);padding:12px}
    .item.open .item-preview{display:block}
    .preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .pbox{background:var(--preview2);border:1px solid var(--line);border-radius:14px;padding:10px}
    .pbox .k{font-size:11px;color:var(--muted);margin-bottom:5px}
    .pbox .v{font-size:14px;font-weight:900}

    .empty{padding:28px 18px 30px;text-align:center;color:var(--muted);font-size:13px;font-weight:700}

    @media(max-width:390px){.item-main{grid-template-columns:auto 1fr}.arrow{display:none}}
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topline">
      <div class="titlebox"><h1>주도섹터</h1></div>
      <div class="actions">
        <button id="themeBtn" class="iconbtn" aria-label="테마 변경"></button>
      </div>
    </div>
    <div class="card status-card">
      <div class="status-left">
        <div class="status-main">
          <span id="sourcePill" class="status-pill waiting">로딩중</span>
          <span id="sourceText">데이터를 불러오는 중...</span>
        </div>
        <div id="updatedText" class="status-time">잠시만 기다려주세요</div>
      </div>
      <div class="live-box">
        <span id="apiIndicator" class="status-indicator yellow"></span>
        <span id="countdownText">갱신 60초</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="filters" id="subFilters">
      <button class="filter" style="background:var(--accent);color:var(--bg);border-color:transparent">전체</button>
    </div>
    <div class="sortrow" id="sortrow">
      <button class="sort active">거래대금</button>
      <button class="sort">거래량</button>
      <button class="sort">상승률</button>
      <button class="sort">시가총액</button>
    </div>
    <div class="theme-summary" id="themeSummary"></div>
    <div class="list" id="listRoot">
      <!-- 초기 스켈레톤 5개 -->
      <div class="skeleton-item"><div class="sk-rank"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line narrow"></div></div></div>
      <div class="skeleton-item"><div class="sk-rank"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line narrow"></div></div></div>
      <div class="skeleton-item"><div class="sk-rank"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line narrow"></div></div></div>
      <div class="skeleton-item"><div class="sk-rank"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line narrow"></div></div></div>
      <div class="skeleton-item"><div class="sk-rank"></div><div class="sk-body"><div class="sk-line wide"></div><div class="sk-line narrow"></div></div></div>
    </div>
  </div>
</div>

<script>
const sunIcon='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
const moonIcon='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

const SORTS=['거래대금','거래량','상승률','시가총액'];

const state={
  theme:'dark',
  activeSubFilter:'전체',
  activeSort:'거래대금',   // ← 기본값 거래대금
  openIndex:null,
  countdown:60,
  timer:null,
  dataReady:false,         // ← hasLoaded 대신 dataReady로 단순화
  leader:{categories:[],sectors:[],meta:{}},
  volume:{items:[],meta:{}},
  amount:{items:[],meta:{}}
};

const el={
  themeBtn:document.getElementById('themeBtn'),
  subFilters:document.getElementById('subFilters'),
  sortrow:document.getElementById('sortrow'),
  themeSummary:document.getElementById('themeSummary'),
  listRoot:document.getElementById('listRoot'),
  sourcePill:document.getElementById('sourcePill'),
  sourceText:document.getElementById('sourceText'),
  updatedText:document.getElementById('updatedText'),
  apiIndicator:document.getElementById('apiIndicator'),
  countdownText:document.getElementById('countdownText')
};

/* ── 유틸 ── */
function formatPrice(v){return `${Number(v||0).toLocaleString()}원`;}
function formatVolume(v){
  const n=Number(v||0);
  if(n>=100000000)return `${(n/100000000).toFixed(1)}억주`;
  if(n>=10000000)return `${(n/10000000).toFixed(1)}천만주`;
  if(n>=10000)return `${Math.round(n/10000).toLocaleString()}만주`;
  return `${n.toLocaleString()}주`;
}
function formatAmount(v){
  const n=Number(v||0);
  if(n>=1000000000000)return `${(n/1000000000000).toFixed(1)}조`;
  if(n>=100000000)return `${Math.round(n/100000000).toLocaleString()}억`;
  if(n>=10000)return `${Math.round(n/10000).toLocaleString()}만`;
  return n.toLocaleString();
}
function getColor(str){
  let h=0;for(let i=0;i<str.length;i++)h=str.charCodeAt(i)+((h<<5)-h);
  return `var(--c-${(Math.abs(h)%8)+1})`;
}

/* ── 상태 표시 ── */
function renderStatus(){
  const meta=state.leader.meta||{};
  const isReal=meta.source==='real';
  const isLoading=!state.dataReady;

  if(isLoading){
    el.sourcePill.className='status-pill waiting';
    el.sourcePill.textContent='로딩중';
    el.sourceText.textContent='데이터를 불러오는 중...';
    el.updatedText.textContent='잠시만 기다려주세요';
    el.apiIndicator.className='status-indicator yellow';
  } else {
    el.sourcePill.className=`status-pill ${isReal?'real':'error'}`;
    el.sourcePill.textContent=isReal?'실시간':'에러';
    el.sourceText.textContent=isReal?'데이터 연동됨':(meta.message||'호출 실패');
    el.updatedText.textContent=meta.updatedAt?`${new Date(meta.updatedAt).toLocaleTimeString('ko-KR')} 기준`:'업데이트 실패';
    el.apiIndicator.className=`status-indicator ${isReal?'green':'red'}`;
  }
  el.countdownText.textContent=`갱신 ${state.countdown}초`;
}

/* ── 테마 필터 버튼 ── */
function renderSubFilters(){
  el.subFilters.innerHTML='';
  const list=['전체',...(state.leader.categories||[])];

  list.forEach(x=>{
    const b=document.createElement('button');
    b.className='filter';
    b.textContent=x;
    const active=state.activeSubFilter===x;

    if(x==='전체'){
      b.style.background=active?'var(--accent)':'var(--chip)';
      b.style.color=active?'var(--bg)':'var(--text)';
      b.style.borderColor=active?'transparent':'var(--line)';
    } else {
      const c=getColor(x);
      b.style.background=active?c:`color-mix(in srgb,${c} 18%,var(--chip))`;
      b.style.color=active?'#111':'var(--text)';
      b.style.borderColor=active?c:`color-mix(in srgb,${c} 40%,transparent)`;
    }

    b.onclick=()=>{state.activeSubFilter=x;state.openIndex=null;renderAll();};
    el.subFilters.appendChild(b);
  });
}

/* ── 정렬 버튼 ── */
function renderSorts(){
  el.sortrow.innerHTML='';
  SORTS.forEach(x=>{
    const b=document.createElement('button');
    b.className='sort'+(state.activeSort===x?' active':'');
    b.textContent=x;
    b.onclick=()=>{state.activeSort=x;state.openIndex=null;renderAll();};
    el.sortrow.appendChild(b);
  });
}

/* ── 테마 요약 카드 ── */
function renderThemeSummary(sector){
  if(!sector){el.themeSummary.style.display='none';return;}
  el.themeSummary.style.display='block';
  el.themeSummary.innerHTML=`
    <div class="summary-card">
      <div class="summary-title">${sector.name}</div>
      <div class="summary-desc">${sector.reason}</div>
      <div class="summary-stats">
        <span>평균 등락률: <span style="color:${parseFloat(sector.chg)>0?'var(--good)':'inherit'}">${sector.chg}</span></span>
        <span>합산 거래대금: ${sector.volume}</span>
      </div>
    </div>`;
}

/* ── 종목 리스트 렌더링 ── */
function renderStockList(){
  // 데이터 아직 없으면 스켈레톤 유지
  if(!state.dataReady){return;}

  let items=[];
  let accent='var(--accent)';
  let badgeName='국내주식';

  if(state.activeSubFilter==='전체'){
    el.themeSummary.style.display='none';

    // ① amount.items + volume.items 합쳐서 중복 코드 제거
    const pool=[...(state.amount.items||[]),...(state.volume.items||[])];
    const map=new Map();
    pool.forEach(it=>{if(it.code&&!map.has(it.code))map.set(it.code,it);});
    items=Array.from(map.values());

    // ② pool이 없으면 leader sectors 안의 stocks 전부 합침 (폴백)
    if(!items.length){
      const allStocks=[];
      (state.leader.sectors||[]).forEach(s=>(s.stocks||[]).forEach(sk=>allStocks.push(sk)));
      const fallbackMap=new Map();
      allStocks.forEach(it=>{if(it.code&&!fallbackMap.has(it.code))fallbackMap.set(it.code,it);});
      items=Array.from(fallbackMap.values());
    }

  } else {
    const sector=(state.leader.sectors||[]).find(s=>s.name===state.activeSubFilter);
    if(sector){
      items=[...(sector.stocks||[])];
      accent=getColor(sector.name);
      badgeName=sector.name;
      renderThemeSummary(sector);
    } else {
      el.themeSummary.style.display='none';
    }
  }

  // 정렬
  items.sort((a,b)=>{
    if(state.activeSort==='거래량') return (b.volume||0)-(a.volume||0);
    if(state.activeSort==='거래대금') return (b.amount||0)-(a.amount||0);
    if(state.activeSort==='상승률') return (b.changeRate||0)-(a.changeRate||0);
    if(state.activeSort==='시가총액') return (b.marketCapEok||0)-(a.marketCapEok||0);
    return 0;
  });

  items=items.slice(0,10);

  el.listRoot.innerHTML='';
  if(!items.length){
    el.listRoot.innerHTML='<div class="empty">데이터가 없습니다.<br><small style="font-weight:500">서버 로그를 확인해주세요.</small></div>';
    return;
  }

  items.forEach((row,idx)=>{
    const open=state.openIndex===idx;
    const item=document.createElement('div');
    item.className='item'+(open?' open':'');

    const cr=Number(row.changeRate||0);
    const cv=Number(row.changeValue||0);
    const chgColor=cr>0?'var(--good)':cr<0?'var(--bad)':'var(--muted)';
    const chgSign=cr>0?'+':'';

    // price 값 정규화 (숫자 또는 이미 포맷된 문자열 모두 처리)
    const priceRaw=String(row.price||'0').replace(/,/g,'');
    const priceNum=Number(priceRaw)||0;

    item.innerHTML=`
      <div class="item-main">
        <div class="rank" style="background:color-mix(in srgb,${accent} 18%,transparent);color:${accent}">${idx+1}</div>
        <div class="item-info">
          <div class="row1">
            <div class="name">${row.name||'-'}</div>
            <span class="badge" style="background:color-mix(in srgb,${accent} 12%,transparent);color:${accent};border-color:color-mix(in srgb,${accent} 35%,transparent)">${badgeName}</span>
          </div>
          <div class="row2">
            <span>거래대금 ${formatAmount(row.amount)}</span>
            <span>거래량 ${formatVolume(row.volume)}</span>
            <span style="color:${chgColor}">${chgSign}${cr}%</span>
          </div>
        </div>
        <div class="arrow">${open?'−':'＋'}</div>
      </div>
      <div class="item-preview">
        <div class="preview-grid">
          <div class="pbox">
            <div class="k">현재가</div>
            <div class="v">${formatPrice(priceNum)}</div>
          </div>
          <div class="pbox">
            <div class="k">전일대비</div>
            <div class="v" style="color:${chgColor}">${chgSign}${cv.toLocaleString()}원<br><small>${chgSign}${cr}%</small></div>
          </div>
          <div class="pbox">
            <div class="k">거래량</div>
            <div class="v">${formatVolume(row.volume)}</div>
          </div>
          <div class="pbox">
            <div class="k">거래대금</div>
            <div class="v">${formatAmount(row.amount)}</div>
          </div>
          <div class="pbox">
            <div class="k">시가총액</div>
            <div class="v">${row.marketCap||'정보없음'}</div>
          </div>
          <div class="pbox">
            <div class="k">종목코드</div>
            <div class="v">${row.code||'-'}</div>
          </div>
        </div>
      </div>`;

    item.querySelector('.item-main').onclick=()=>{
      state.openIndex=state.openIndex===idx?null:idx;
      renderAll();
    };
    el.listRoot.appendChild(item);
  });
}

/* ── 전체 렌더 ── */
function renderAll(){
  renderStatus();
  renderSubFilters();
  renderSorts();
  renderStockList();
}

/* ── API 호출 ── */
async function safeJson(url){
  try{const r=await fetch(url,{cache:'no-store'});return await r.json();}
  catch(e){return null;}
}

async function fetchAllData(){
  state.countdown=60;
  el.apiIndicator.className='status-indicator yellow';
  el.countdownText.textContent='갱신 60초';

  try{
    // 먼저 거래대금/거래량 랭킹을 빠르게 가져와서 화면 즉시 표시
    const [volume,amount]=await Promise.all([
      safeJson('/api/market/volume-top'),
      safeJson('/api/market/amount-top')
    ]);

    if(volume)state.volume=volume;
    if(amount)state.amount=amount;

    // dataReady를 true로 바꿔서 스켈레톤 → 실제 데이터로 전환
    state.dataReady=true;
    renderAll();

    // 이후 테마 데이터(느림) 별도 로드 → 완료되면 다시 렌더
    const leader=await safeJson('/api/data');
    if(leader && leader.categories && leader.categories.length>0){
      state.leader=leader;
      renderAll();
    }

  }catch(e){
    state.dataReady=true;
    renderAll();
  }
}

/* ── 폴링 ── */
function startPolling(){
  clearInterval(state.timer);
  state.timer=setInterval(()=>{
    state.countdown=Math.max(0,state.countdown-1);
    el.countdownText.textContent=`갱신 ${state.countdown}초`;
    if(state.countdown===0)fetchAllData();
  },1000);
}

/* ── 초기화 ── */
el.themeBtn.onclick=()=>{
  const t=state.theme==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',t);
  el.themeBtn.innerHTML=t==='light'?moonIcon:sunIcon;
  state.theme=t;
};

// 다크 모드로 시작
document.documentElement.setAttribute('data-theme','dark');
el.themeBtn.innerHTML=sunIcon;

fetchAllData();
startPolling();
</script>
</body>
</html>
