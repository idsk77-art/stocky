<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>주도섹터 앱</title>
<style>
:root{
  --bg: #f8fafc;
  --card: #ffffff;
  --text: #0f172a;
  --muted: #64748b;
  --line: #e2e8f0;
  --accent: #0f172a;
  --text-on-accent: #ffffff;
  --accent2: #2563eb;
  --shadow: 0 8px 24px rgba(15,23,42,.06);
  --radius: 20px;
  --chip: #f1f5f9;
  --preview: #f8fafc;
  --preview2: #ffffff;
  --bg-mix: 15%;
  --c-1: #93c5fd; --c-2: #fca5a5; --c-3: #fde047; --c-4: #86efac;
  --c-5: #d8b4fe; --c-6: #fdba74; --c-7: #67e8f9; --c-8: #f9a8d4;
  --text-on-sec: #0f172a;
}
html[data-theme="dark"]{
  --bg: #0d0d0d;
  --card: #1a1a1a;
  --text: #e0e0e0;
  --muted: #999999;
  --line: #2c2c2c;
  --accent: #e0e0e0;
  --text-on-accent: #0d0d0d;
  --accent2: #60a5fa;
  --shadow: 0 10px 26px rgba(0,0,0,.6);
  --chip: #222222;
  --preview: #131313;
  --preview2: #1a1a1a;
  --bg-mix: 25%;
  --c-1: #93c5fd; --c-2: #fca5a5; --c-3: #fde047; --c-4: #86efac;
  --c-5: #d8b4fe; --c-6: #fdba74; --c-7: #67e8f9; --c-8: #f9a8d4;
  --text-on-sec: #000000;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
  transition: background-color 0.2s, color 0.2s;
}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding:12px 12px 16px;
  display:flex;
  flex-direction:column;
  gap:12px
}
.topbar{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-top:2px
}
.topline{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px
}
.title h1{
  margin:0;
  font-size:22px;
  letter-spacing:-.03em;
  line-height:1.1
}
.actions{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:nowrap;
  justify-content:flex-end;
}
button{
  border:0;
  border-radius:999px;
  padding:10px 13px;
  font-weight:800;
  font-size:12px;
  cursor:pointer;
  color:var(--text);
  background:var(--card);
  box-shadow:var(--shadow);
  border:1px solid var(--line);
  transition: all 0.15s;
}
button:active { transform: scale(0.96); }
.iconbtn{
  width:32px; height:32px; padding:0; display:grid; place-items:center; border-radius:50%; color:var(--text);
}
.status{
  display:flex; justify-content:flex-end; gap:12px; font-size:12px; font-weight:700;
  color:var(--muted); padding:0 2px; transition: color 0.2s; align-items:center;
}
.status-indicator {
  display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:6px;
  background: #ccc; transition: all 0.3s;
}
.status-indicator.green { background: #10b981; box-shadow: 0 0 6px #10b981; }
.status-indicator.red { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
.status-indicator.yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b; }

.card{
  background:var(--card); border:1px solid var(--line);
  border-radius:var(--radius); box-shadow:var(--shadow); overflow:hidden
}
.tabs { display: flex; gap: 8px; padding: 14px 14px 0; }
.tab {
  flex: 1; text-align: center; padding: 10px; border-radius: 12px;
  font-size: 13px; font-weight: 800; background: var(--chip);
  color: var(--muted); box-shadow: none;
}
.tab.active { background: var(--accent); color: var(--text-on-accent); border-color: transparent; }
.filters,.sortrow{
  display:flex; gap:8px; overflow:auto; padding:12px 14px 0; scrollbar-width:none
}
.filters::-webkit-scrollbar,.sortrow::-webkit-scrollbar{display:none}
.filter,.sort{
  white-space:nowrap; padding:9px 13px; border-radius:999px;
  border:1px solid transparent; font-size:12px; font-weight:800; color:var(--text); box-shadow:none;
}
.sort{ background:var(--chip); border-color:var(--line); }
.sort.active{ background:var(--accent); color:var(--text-on-accent); border-color:transparent }
.list{ display:flex; flex-direction:column; gap:10px; padding:12px 14px 14px }
.item{
  border:1px solid var(--line); border-radius:18px; overflow:hidden;
  background:var(--card); box-shadow: 0 4px 14px rgba(0,0,0,.03);
}
html[data-theme="dark"] .item { box-shadow: 0 4px 14px rgba(0,0,0,.2); }
.item-main{
  display:grid; grid-template-columns:auto 1fr auto; gap:10px; align-items:center; padding:12px; cursor:pointer
}
.rank{
  width:32px; height:32px; border-radius:10px; background:color-mix(in srgb, var(--text) 10%, transparent);
  display:grid; place-items:center; font-size:12px; font-weight:900; color:var(--text)
}
.item-info{min-width:0}
.item-info .row1{ display:flex; align-items:center; gap:8px; flex-wrap:wrap }
.item-info .name{ font-size:15px; font-weight:900; letter-spacing:-.02em; color:var(--text) }
.badge{
  font-size:11px; padding:4px 8px; border-radius:999px; font-weight:800; border: 1px solid;
}
.item-info .row2{
  margin-top:4px; display:flex; gap:10px; flex-wrap:wrap; color:var(--muted); font-size:12px
}
.arrow{
  width:34px; height:34px; border-radius:50%; background:color-mix(in srgb, var(--text) 5%, transparent);
  display:grid; place-items:center; font-weight:900; border:1px solid var(--line)
}
.item.open .item-preview{display:block}
.item-preview{ display:none; border-top:1px solid var(--line); background:var(--preview); padding:12px }
.preview-grid{ display:grid; grid-template-columns:1fr 1fr; gap:8px }
.pbox{ background:var(--preview2); border:1px solid var(--line); border-radius:14px; padding:10px }
.pbox .k{ font-size:11px; color:var(--muted); margin-bottom:5px }
.pbox .v{ font-size:14px; font-weight:800; letter-spacing:-.01em; color:var(--text); }
.preview-note{ margin-top:10px; font-size:12px; color:var(--text); line-height:1.5 }

.news-box { margin-top: 14px; border-top: 1px dashed var(--line); padding-top: 12px; }
.news-box .news-k { font-size: 12px; font-weight: 800; color: var(--text); margin-bottom: 8px; display: flex; align-items: center; gap: 4px; }
.news-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
.news-list li { display: flex; align-items: center; gap: 6px; }
.news-list li::before { content: '▪'; color: var(--accent2); font-size: 10px; }
.news-list a { font-size: 12px; color: var(--text); text-decoration: none; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: color 0.2s; }
.news-list a:hover { color: var(--accent2); text-decoration: underline; }

.overlay{
  position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:flex-end; justify-content:center; z-index:30
}
.overlay.show{display:flex}
.sheet{
  width:min(430px,100%); background:var(--card); border-radius:24px 24px 0 0;
  border:1px solid var(--line); box-shadow:0 -16px 32px rgba(0,0,0,.3); padding:14px; max-height:85vh; overflow:auto
}
.sheet-head{ display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:10px }
.sheet-head h3{margin:0;font-size:16px}
.field{margin-bottom:12px}
.field label{ display:block; font-size:12px; font-weight:800; margin:0 0 6px }
.field input,.field select{
  width:100%; border:1px solid var(--line); border-radius:14px; padding:12px 14px;
  background:var(--bg); color:var(--text); font-size:14px; outline:none
}
.field input:focus,.field select:focus{ border-color: var(--accent2); }
.btnrow{ display:flex; gap:8px; flex-wrap:wrap; margin-top:4px }
.pill-toggle {
  padding: 8px 12px; border-radius: 999px; border: 1px solid var(--line);
  background: var(--chip); color: var(--text); font-size: 12px; font-weight: 800;
  cursor: pointer; transition: all 0.2s; box-shadow: none;
}
.pill-toggle.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }

@media (max-width:390px){
  .item-main{grid-template-columns:auto 1fr}
  .arrow{display:none}
  .title h1{font-size:20px}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topline">
      <div class="title">
        <h1>주도섹터</h1>
      </div>
      <div class="actions">
        <button id="themeBtn" class="iconbtn" aria-label="테마 변경" title="테마 변경"></button>
        <button id="settingBtn" class="iconbtn" aria-label="환경설정" title="환경설정">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.3l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06A2 2 0 1 1 19.71 7l-.06.06A1.65 1.65 0 0 0 19.4 9c.38.31.77.71 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>
    <div class="status">
      <div style="display:flex; align-items:center; width:100%; justify-content: space-between;">
        <span id="lastUpdated" style="font-size: 11px; font-weight: 500;">업데이트 대기중</span>
        <div style="display:flex; align-items:center;">
          <span id="apiIndicator" class="status-indicator yellow"></span>
          <span id="connectionStatus">데이터 로딩중... (60초)</span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="tabs" id="mainTabs">
      <button class="tab active" data-type="테마">테마</button>
      <button class="tab" data-type="업종">업종</button>
    </div>
    <div class="filters" id="subFilters"></div>
    <div class="sortrow" id="sortrow"></div>
    <div class="list" id="sectorList"></div>
  </div>
</div>

<div class="overlay" id="settingsOverlay" aria-hidden="true">
  <div class="sheet">
    <div class="sheet-head"><h3>환경설정 (클라우드 동기화 ☁️)</h3><button id="closeSettingBtn">닫기</button></div>
    
    <div class="field">
      <label>테마 추가 (6~10위)</label>
      <div id="extraThemeList" class="btnrow"></div>
    </div>
    <div class="field">
      <label>업종 추가 (6~10위)</label>
      <div id="extraSectorList" class="btnrow"></div>
    </div>

    <div class="field">
      <label>하위 분류 표시 개수 (제한없음)</label>
      <input type="number" id="filterCount" min="1" max="999" placeholder="기본 5개" />
    </div>

    <div class="field">
      <label>📊 주도섹터 필터 기준</label>
    </div>
    <div class="field">
      <label>거래대금 최소 (억원)</label>
      <input type="number" id="thTradeAmt" min="0" step="100" placeholder="2000" />
    </div>
    <div class="field">
      <label>거래량 최소 (주)</label>
      <input type="number" id="thVolume2" min="0" step="100000" placeholder="2000000" />
    </div>
    <div class="field">
      <label>시가총액 최소 (조원)</label>
      <input type="number" id="thMcap" min="0" step="0.5" placeholder="1" />
    </div>
    <div class="field">
      <label>체결강도 최소 (%)</label>
      <input type="number" id="thStrength" min="0" step="1" placeholder="100" />
    </div>
    <div class="field">
      <label>수급 조건</label>
      <div class="btnrow">
        <button class="pill-toggle active" id="toggleProgramPlus" style="background:#e53935;color:#fff;border-color:#e53935;">🔴 프로그램 플러스</button>
      </div>
    </div>

    <hr style="border:0; border-top:1px solid var(--line); margin:16px 0;">

    <div class="btnrow" style="margin-top:10px;">
      <button id="clearSettingBtn" style="width:100%;">모든 설정 초기화</button>
    </div>

  </div>
</div>

<script type="module">

const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
let app = null, auth = null, db = null;

if (Object.keys(firebaseConfig).length > 0) {
  app = initializeApp(firebaseConfig);
  auth = getAuth(app);
  db = getFirestore(app);
}

// 아이콘 16px 크기
const sunIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;
const moonIcon = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;

const DEFAULT_CATEGORIES = {
  '테마': ['MLCC','2차전지','로봇','바이오','AI','우주항공','원전','신재생','보안','초전도체'],

};

// 상승률, 거래량 정렬 규칙 추가
const SORTS = ['거래대금','거래량','상승률','시총','변동성'];

// 앱 첫 렌더링 시 하얗게 비어있는 현상을 완벽히 차단하기 위한 기본 안전 장치 데이터 (기본 설정에 걸러지지 않게 보정 완료)
const SAMPLE_DATA = {

    {type:'테마',name:'에코프로',sector:'2차전지',reason:'ESS·리사이클 기대',chg:'+8.5%',volume:'8.7조',marketCap:'38조',roi:'+12.5%', tradeVolume: 12000000, strength: 120, stocks:[{name:'에코프로',price:'121,000',chg:'+12.5%'},{name:'에코프로비엠',price:'238,000',chg:'+11.2%'}]},
    {type:'테마',name:'레인보우로보틱스',sector:'로봇',reason:'자동화 투자 확대',chg:'+6.1%',volume:'1.3조',marketCap:'11조',roi:'+5.8%', tradeVolume: 4500000, strength: 110, stocks:[{name:'레인보우로보틱스',price:'251,000',chg:'+5.8%'},{name:'두산로보틱스',price:'64,200',chg:'+2.9%'}]},
    {type:'테마',name:'알테오젠',sector:'바이오',reason:'플랫폼 기대',chg:'+6.8%',volume:'4.1조',marketCap:'24조',roi:'+4.1%', tradeVolume: 6000000, strength: 130, stocks:[{name:'알테오젠',price:'287,000',chg:'+4.5%'},{name:'리가켐바이오',price:'105,000',chg:'+5.2%'}]},

    {type:'업종',name:'현대차',sector:'자동차',reason:'사상 최대 실적',chg:'+2.1%',volume:'3.1조',marketCap:'55조',roi:'+1.5%', tradeVolume: 3500000, strength: 110, stocks:[{name:'현대차',price:'245,000',chg:'+1.5%'},{name:'기아',price:'115,000',chg:'+1.8%'}]}
  ]
};

// 로컬스토리지에서 안전하게 값을 가져오는 함수
const getSafeInt = (key, defaultVal) => {
  const val = localStorage.getItem(key);
  return val !== null && val !== '' ? parseInt(val) : defaultVal;
};
const getSafeFloat = (key, defaultVal) => {
  const val = localStorage.getItem(key);
  return val !== null && val !== '' ? parseFloat(val) : defaultVal;
};

// 초기 정렬 기준 거래대금 많은 순으로 변경
let state = {
  theme: localStorage.getItem('theme') || 'light',
  thTradeAmt: getSafeInt('thTradeAmt', 2000),     // 기본 거래대금 2천억
  thVolume2: getSafeInt('thVolume2', 2000000),    // 기본 거래량 2백만
  thMcap: getSafeFloat('thMcap', 1),              // 기본 시총 1조
  thStrength: getSafeFloat('thStrength', 100),    // 기본 체결강도 100
  programPlusOnly: localStorage.getItem('programPlusOnly') !== 'false',
  timer: null,
  data: SAMPLE_DATA, 
  countdown: 60,
  activeMainTab: '테마',
  activeSubFilter: '전체',
  activeSort: '거래대금', // 처음 정렬 무조건 거래대금
  filterCount: getSafeInt('filterCount', 5),
  customFilters: JSON.parse(localStorage.getItem('customFilters') || 'null') || { '테마': [], '업종': [] },
  openIndex: null
};

let currentStatusText = '연결 대기중';
let failCount = 0; 

const el = {
  themeBtn: document.getElementById('themeBtn'),
  settingBtn: document.getElementById('settingBtn'),
  lastUpdated: document.getElementById('lastUpdated'),
  connectionStatus: document.getElementById('connectionStatus'),
  apiIndicator: document.getElementById('apiIndicator'),
  mainTabs: document.querySelectorAll('.tab'),
  subFilters: document.getElementById('subFilters'),
  sortrow: document.getElementById('sortrow'),
  sectorList: document.getElementById('sectorList'),
  overlay: document.getElementById('settingsOverlay'),
  closeSettingBtn: document.getElementById('closeSettingBtn'),
  clearSettingBtn: document.getElementById('clearSettingBtn'),
  filterCount: document.getElementById('filterCount'),
  thTradeAmt: document.getElementById('thTradeAmt'),
  thVolume2: document.getElementById('thVolume2'),
  thMcap: document.getElementById('thMcap'),
  thStrength: document.getElementById('thStrength'),
  toggleProgramPlus: document.getElementById('toggleProgramPlus')
};

function getColorVar(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return `var(--c-${(Math.abs(hash) % 8) + 1})`;
}
function getBgVar(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return `color-mix(in srgb, var(--c-${(Math.abs(hash) % 8) + 1}) var(--bg-mix, 15%), var(--card))`;
}

function themeApply(t){
  document.documentElement.setAttribute('data-theme',t);
  el.themeBtn.innerHTML = t === 'light' ? moonIcon : sunIcon;
  localStorage.setItem('theme',t);
}

el.mainTabs.forEach(tab => {
  tab.onclick = (e) => {
    el.mainTabs.forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    state.activeMainTab = e.target.getAttribute('data-type');
    state.activeSubFilter = '전체';
    state.openIndex = null;
    renderAll();
  };
});

function renderSubFilters() {
  el.subFilters.innerHTML = '';
  const catList = state.data.categories ? state.data.categories[state.activeMainTab] : DEFAULT_CATEGORIES[state.activeMainTab];
  const topList = catList.slice(0, state.filterCount);
  const extras = catList.slice(state.filterCount).filter(x => state.customFilters[state.activeMainTab].includes(x));
  const displayCats = ['전체', ...topList, ...extras];

  displayCats.forEach(x => {
    const b = document.createElement('button');
    b.className = 'filter';
    b.textContent = x;
    const active = state.activeSubFilter === x;
    
    // 클릭 전에도 고유 테마 컬러가 나타나도록 수정
    if (x === '전체') {
      if (active) {
        b.style.background = 'var(--accent)'; b.style.color = 'var(--text-on-accent)'; b.style.borderColor = 'transparent';
      } else {
        b.style.background = 'var(--chip)'; b.style.color = 'var(--text)'; b.style.borderColor = 'transparent';
      }
    } else {
      const colorStr = getColorVar(x);
      if (active) {
        b.style.background = colorStr; b.style.color = '#000000'; b.style.borderColor = colorStr;
      } else {
        b.style.background = `color-mix(in srgb, ${colorStr} 20%, var(--chip))`;
        b.style.color = 'var(--text)';
        b.style.borderColor = `color-mix(in srgb, ${colorStr} 40%, transparent)`;
      }
    }
    
    b.onclick = () => { state.activeSubFilter = x; state.openIndex = null; renderAll(); };
    el.subFilters.appendChild(b);
  });
}

function renderSorts(items){
  el.sortrow.innerHTML='';
  items.forEach(x=>{
    const b = document.createElement('button');
    b.className = 'sort' + (state.activeSort === x ? ' active' : '');
    b.textContent = x;
    b.onclick = () => { state.activeSort = x; state.openIndex = null; renderAll(); };
    el.sortrow.appendChild(b);
  });
}

function num(v){ return parseFloat(String(v).replace(/[^0-9.\-]/g,''))||0; }

function numTri(v){
  const s = String(v).replace(/,/g,'');
  const m = s.match(/([0-9.]+)(조|억)?/);
  if(!m) return 0;
  const n = parseFloat(m[1]);
  if(m[2] === '조') return n * 10000; // 조 단위는 억 단위(x10000)로 통일
  if(m[2] === '억') return n;
  return n;
}

function getThresh(){
  const getVal = (inputEl, stateVal) => (inputEl && inputEl.value !== '') ? parseFloat(inputEl.value) : stateVal;
  return {
    amt: getVal(el.thTradeAmt, state.thTradeAmt),
    vol: getVal(el.thVolume2, state.thVolume2),
    mcap: getVal(el.thMcap, state.thMcap),
    str: getVal(el.thStrength, state.thStrength),
  };
}

function passesFilter(sec){
  const t = getThresh();
  const vol = numTri(sec.volume);        // 무조건 억 단위 변환
  const mc = numTri(sec.marketCap);      // 무조건 억 단위 변환
  
  const okAmt   = vol >= t.amt;
  const okMcap  = mc >= (t.mcap * 10000); // 1조(t.mcap) = 10000억
  const tradeVol = sec.tradeVolume || 5000000; // undefined 에러 방지
  const okVol   = tradeVol >= t.vol;
  const str = parseFloat(sec.strength || 150); // undefined 에러 방지
  const okStr = str >= t.str; 
  const okProg = sec.programNet === undefined || !state.programPlusOnly || sec.programNet > 0;
  
  return okAmt && okMcap && okVol && okStr && okProg;
}

function getFilteredAndSortedSectors() {
  let list = (state.data.sectors || []).filter(s => s.type === state.activeMainTab).filter(passesFilter);
  
  const sortKey = state.activeSort;
  const fn = {
    '거래대금': (a,b) => numTri(b.volume) - numTri(a.volume),
    '거래량': (a,b) => (b.tradeVolume || 0) - (a.tradeVolume || 0),
    '상승률': (a,b) => num(b.chg) - num(a.chg),
    '시총': (a,b) => numTri(b.marketCap) - numTri(a.marketCap),
    '변동성': (a,b) => b.name.length - a.name.length
  }[sortKey] || ((a,b) => numTri(b.volume) - numTri(a.volume));
  
  list.sort(fn);

  if (state.activeSubFilter !== '전체') {
    list = list.filter(item => item.sector === state.activeSubFilter);
  }
  return list; 
}

function generateMockNews(keyword) {
  const enc = encodeURIComponent(keyword);
  return [
    { title: `[특징주] ${keyword} 관련주 시장 주도 뚜렷`, link: `https://search.naver.com/search.naver?where=news&query=${enc}&sort=1` },
    { title: `외국인 순매수 집중... ${keyword} 랠리 본격화되나`, link: `https://search.naver.com/search.naver?where=news&query=${enc}&sort=1` },
    { title: `${keyword} 핵심 산업 부각, 수혜주 찾기 분주`, link: `https://search.naver.com/search.naver?where=news&query=${enc}&sort=1` },
    { title: `${keyword} 턴어라운드 기대감 확산, 목표가 줄상향`, link: `https://search.naver.com/search.naver?where=news&query=${enc}&sort=1` },
    { title: `전문가 분석: 단기 급등한 ${keyword} 향후 전망은?`, link: `https://search.naver.com/search.naver?where=news&query=${enc}&sort=1` }
  ];
}

function previewHTML(sec){
  const newsList = sec.news || generateMockNews(sec.name);
  const newsHTML = newsList.slice(0,5).map(n => `<li><a href="${n.link}" target="_blank">${n.title}</a></li>`).join('');

  return `
    <div class="item-preview">
      <div class="preview-grid">
        <div class="pbox"><div class="k">현재가 기준</div><div class="v">${sec.stocks[0].price}</div></div>
        <div class="pbox"><div class="k">등락률</div><div class="v">${sec.chg}</div></div>
        <div class="pbox"><div class="k">거래대금</div><div class="v">${sec.volume}</div></div>
        <div class="pbox"><div class="k">시가총액</div><div class="v">${sec.marketCap}</div></div>
      </div>
      <div class="preview-note">핵심 포인트: ${sec.reason}<br>관련 종목: ${sec.stocks.map(s=>s.name).join(' · ')}</div>
      
      <div class="news-box">
        <div class="news-k">📰 관련 최신 뉴스 (클릭시 새창)</div>
        <ul class="news-list">${newsHTML}</ul>
      </div>
    </div>`;
}

function renderSectorList(){
  el.sectorList.innerHTML='';
  const items = getFilteredAndSortedSectors();
  
  items.forEach((sec,idx)=>{
    const open = state.openIndex === idx;
    const item = document.createElement('div');
    const colorStr = getColorVar(sec.sector); 
    const formatVol = (v) => v ? (v/10000).toFixed(0) + '만주' : '-'; 
    
    item.className = 'item' + (open?' open':'');
    item.innerHTML = `
      <div class="item-main">
        <div class="rank">${idx+1}</div>
        <div class="item-info">
          <div class="row1">
            <div class="name">${sec.name}</div>
            <span class="badge">${sec.sector}</span>
          </div>
          <div class="row2">
            <span>거래대금 ${sec.volume}</span>
            <span>거래량 ${formatVol(sec.tradeVolume)}</span>
            <span>상승률 ${sec.chg}</span>
          </div>
        </div>
        <div class="arrow">${open?'−':'＋'}</div>
      </div>
      ${open ? previewHTML(sec) : ''}
    `;
    item.querySelector('.item-main').onclick = () => { state.openIndex = state.openIndex === idx ? null : idx; renderAll(); };
    item.style.background = getBgVar(sec.sector);
    
    const badge = item.querySelector('.badge');
    badge.style.background = `color-mix(in srgb, ${colorStr} 15%, transparent)`;
    badge.style.color = colorStr;
    badge.style.borderColor = `color-mix(in srgb, ${colorStr} 40%, transparent)`;
    
    if(state.activeSubFilter !== '전체' && sec.sector === state.activeSubFilter) {
      item.style.borderColor = colorStr; item.style.boxShadow = `0 0 0 1px ${colorStr} inset`;
    } else {
      item.style.borderColor = 'var(--line)';
    }
    el.sectorList.appendChild(item);
  });
}

function renderSettingExtras() {
  const renderGroup = (type, containerId) => {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    const list = state.data.categories ? state.data.categories[type] : DEFAULT_CATEGORIES[type];
    const extraCandidates = list ? list.slice(state.filterCount) : []; 

    if (extraCandidates.length === 0) {
      container.innerHTML = '<span style="font-size:12px; color:var(--muted)">추가할 수 있는 항목이 없습니다.</span>';
      return;
    }

    extraCandidates.forEach((cat) => {
      const btn = document.createElement('button');
      const isActive = state.customFilters[type].includes(cat);
      btn.className = 'pill-toggle' + (isActive ? ' active' : '');
      btn.textContent = cat;
      btn.onclick = () => {
        if (state.customFilters[type].includes(cat)) {
          state.customFilters[type] = state.customFilters[type].filter(x => x !== cat);
          btn.classList.remove('active');
        } else {
          state.customFilters[type].push(cat);
          btn.classList.add('active');
        }
      };
      container.appendChild(btn);
    });
  };
  renderGroup('테마', 'extraThemeList');
  renderGroup('업종', 'extraSectorList');
}

function showSettings(){
  el.overlay.classList.add('show');
  el.overlay.setAttribute('aria-hidden','false');
  if(el.thTradeAmt) el.thTradeAmt.value = state.thTradeAmt;
  if(el.thVolume2)  el.thVolume2.value  = state.thVolume2;
  if(el.thMcap)     el.thMcap.value     = state.thMcap;
  if(el.thStrength) el.thStrength.value = state.thStrength;
  if(el.toggleProgramPlus){
    el.toggleProgramPlus.classList.toggle('active', state.programPlusOnly);
    el.toggleProgramPlus.onclick = () => {
      state.programPlusOnly = !state.programPlusOnly;
      localStorage.setItem('programPlusOnly', state.programPlusOnly);
      el.toggleProgramPlus.classList.toggle('active', state.programPlusOnly);
      el.toggleProgramPlus.style.background = state.programPlusOnly ? '#e53935' : 'var(--chip)';
      el.toggleProgramPlus.style.color = state.programPlusOnly ? '#fff' : 'var(--text)';
      el.toggleProgramPlus.style.borderColor = state.programPlusOnly ? '#e53935' : 'var(--line)';
      renderAll();
    };
  }
  renderSettingExtras();
}
function hideSettings(){
  el.overlay.classList.remove('show');
  el.overlay.setAttribute('aria-hidden','true');
  saveConfigToCloud(); 
}

async function initFirebaseAuth() {
  if(!auth) return;
  if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
    await signInWithCustomToken(auth, __initial_auth_token);
  } else {
    await signInAnonymously(auth);
  }

  onAuthStateChanged(auth, user => {
    if(user && db) {
      const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_config');
      onSnapshot(docRef, (snap) => {
        if(snap.exists()) {
          const cloudData = snap.data();
          state.filterCount = parseInt(cloudData.filterCount) || 5;
          if(cloudData.thTradeAmt !== undefined) state.thTradeAmt = cloudData.thTradeAmt;
          if(cloudData.thVolume2  !== undefined) state.thVolume2  = cloudData.thVolume2;
          if(cloudData.thMcap     !== undefined) state.thMcap     = cloudData.thMcap;
          if(cloudData.thStrength !== undefined) state.thStrength = cloudData.thStrength;
          if(cloudData.programPlusOnly !== undefined) state.programPlusOnly = cloudData.programPlusOnly;
          state.customFilters = cloudData.customFilters || { '테마': [], '업종': [] };
          
          el.filterCount.value = state.filterCount;
          
          renderSettingExtras();
          renderAll();
        }
      });
    }
  });
}
if(auth) initFirebaseAuth();

async function saveConfigToCloud() {
  const count = parseInt(el.filterCount.value);
  state.filterCount = isNaN(count) || count < 1 ? 5 : count;
  
  const getSafeVal = (inputEl, curVal) => (inputEl && inputEl.value !== '') ? parseFloat(inputEl.value) : curVal;
  
  state.thTradeAmt = getSafeVal(el.thTradeAmt, state.thTradeAmt);
  state.thVolume2  = getSafeVal(el.thVolume2, state.thVolume2);
  state.thMcap     = getSafeVal(el.thMcap, state.thMcap);
  state.thStrength = getSafeVal(el.thStrength, state.thStrength);

  localStorage.setItem('thTradeAmt', state.thTradeAmt);
  localStorage.setItem('thVolume2', state.thVolume2);
  localStorage.setItem('thMcap', state.thMcap);
  localStorage.setItem('thStrength', state.thStrength);
  localStorage.setItem('filterCount', state.filterCount);
  localStorage.setItem('customFilters', JSON.stringify(state.customFilters));

  const dataToSave = {
    filterCount: state.filterCount,
    thTradeAmt: state.thTradeAmt,
    thVolume2: state.thVolume2,
    thMcap: state.thMcap,
    thStrength: state.thStrength,
    programPlusOnly: state.programPlusOnly,
    customFilters: state.customFilters
  };

  if (db && auth.currentUser) {
    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'global_config');
    await setDoc(docRef, dataToSave);
  }
}

function updateStatusUI() {
  el.connectionStatus.textContent = currentStatusText + ` (${state.countdown}초)`;
}


async function fetchReal(){
  state.countdown = 60; 
  currentStatusText = '데이터 로딩중...';
  el.apiIndicator.className = 'status-indicator yellow';
  updateStatusUI();
  
  try {
    const res = await fetch('/api/data');
    if(!res.ok) throw new Error('서버 통신 실패');
    
    const text = await res.text();
    let realData;
    try { realData = JSON.parse(text); } catch(err) { throw new Error('데이터 포맷 오류'); }
    
    if(realData && Array.isArray(realData.sectors) && realData.sectors.length > 0) {
      state.data = realData; 
      // 🌟 수정된 부분: 서버에서 준 '진짜 시간'을 화면에 표기합니다.
      el.lastUpdated.textContent = 'API 갱신 완료: ' + (realData.timestamp || '시간 정보 없음');
    } else {
      throw new Error('데이터 응답 형식 오류');
    }
    
    failCount = 0;
    currentStatusText = '연결 양호';
    el.apiIndicator.className = 'status-indicator green';
    
  } catch(e) {
    failCount++;
    if(failCount === 1) {
      currentStatusText = '재시도 중...';
      el.apiIndicator.className = 'status-indicator yellow';
    } else {
      currentStatusText = '통신 에러 (갱신 실패)';
      el.apiIndicator.className = 'status-indicator red';
    }
    
    // 에러 발생 시에만 최후의 수단으로 샘플 데이터를 씁니다.
    if(!state.data || !state.data.sectors || state.data.sectors.length === 0) {
      state.data = SAMPLE_DATA;
      el.lastUpdated.textContent = '오프라인 (샘플 데이터)';
    }
  }
  
  renderAll();
  updateStatusUI();
}

// 🌟 수정된 부분: 첫 화면 깜빡임(Flickering) 완벽 방지
themeApply(state.theme);

    <div style="font-size: 12px; font-weight: 500;">실시간 데이터를 불러오고 있습니다.</div>
  </div>
  <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
`;

// 로딩 화면을 띄운 상태로 진짜 데이터 호출 시작
fetchReal();
poll();
