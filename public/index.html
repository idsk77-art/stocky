<!doctype html>
<html lang="ko" data-theme="light">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
<title>국내주식 모니터</title>
<style>
:root{
  --bg:#f8fafc;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --line:#e2e8f0;
  --accent:#111827;
  --accent2:#2563eb;
  --good:#10b981;
  --warn:#f59e0b;
  --bad:#ef4444;
  --cyan:#0ea5e9;
  --violet:#8b5cf6;
  --shadow:0 8px 24px rgba(15,23,42,.06);
  --radius:20px;
  --chip:#f1f5f9;
  --preview:#f8fafc;
  --preview2:#ffffff;
  --bg-mix:15%;
  --c-1:#93c5fd; --c-2:#fca5a5; --c-3:#fde047; --c-4:#86efac;
  --c-5:#d8b4fe; --c-6:#fdba74; --c-7:#67e8f9; --c-8:#f9a8d4;
}
html[data-theme="dark"]{
  --bg:#0d0d0d;
  --card:#1a1a1a;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --line:#2c2c2c;
  --accent:#e5e7eb;
  --accent2:#60a5fa;
  --chip:#222222;
  --preview:#131313;
  --preview2:#1a1a1a;
  --shadow:0 10px 26px rgba(0,0,0,.55);
  --bg-mix:25%;
}
*{box-sizing:border-box}
body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
  background:var(--bg);
  color:var(--text);
}
button,input{
  font:inherit;
}
button{
  border:1px solid var(--line);
  background:var(--card);
  color:var(--text);
  border-radius:999px;
  padding:10px 13px;
  font-weight:800;
  cursor:pointer;
}
button:active{transform:scale(.97)}
.app{
  max-width:430px;
  margin:0 auto;
  min-height:100vh;
  padding:12px 12px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
}
.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  overflow:hidden;
}
.topbar{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding-top:2px;
}
.topline{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.titlebox{
  display:flex;
  flex-direction:column;
  gap:8px;
  min-width:0;
  flex:1;
}
.appname{
  margin:0;
  font-size:20px;
  line-height:1.1;
  letter-spacing:-.03em;
}
.mode-tabs{
  display:flex;
  gap:8px;
  overflow:auto;
  scrollbar-width:none;
}
.mode-tabs::-webkit-scrollbar{display:none}
.mode-tab{
  white-space:nowrap;
  padding:9px 13px;
  box-shadow:none;
  background:var(--chip);
}
.mode-tab.active{
  background:var(--accent);
  color:#fff;
  border-color:transparent;
}
.mode-tab[data-mode="volume"].active{
  background:var(--cyan);
}
.mode-tab[data-mode="amount"].active{
  background:var(--violet);
}
.actions{
  display:flex;
  gap:8px;
  align-items:center;
}
.iconbtn{
  width:34px;
  height:34px;
  padding:0;
  display:grid;
  place-items:center;
}
.status-card{
  display:grid;
  grid-template-columns:1fr auto;
  gap:8px;
  align-items:center;
  padding:12px 14px;
}
.status-left{
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}
.status-main{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  font-weight:900;
}
.status-pill{
  padding:4px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:900;
  border:1px solid transparent;
}
.status-pill.real{
  background:rgba(16,185,129,.12);
  color:var(--good);
  border-color:rgba(16,185,129,.3);
}
.status-pill.sample{
  background:rgba(245,158,11,.12);
  color:var(--warn);
  border-color:rgba(245,158,11,.35);
}
.status-time{
  font-size:12px;
  color:var(--muted);
}
.status-msg{
  font-size:11px;
  color:var(--muted);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.live-box{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--muted);
  font-weight:800;
}
.status-indicator{
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
  background:#ccc;
}
.status-indicator.green{background:var(--good); box-shadow:0 0 6px var(--good);}
.status-indicator.yellow{background:var(--warn); box-shadow:0 0 6px var(--warn);}
.status-indicator.red{background:var(--bad); box-shadow:0 0 6px var(--bad);}

.panel-head{
  display:flex;
  gap:8px;
  padding:14px 14px 0;
}
.leader-tabs{
  display:flex;
  gap:8px;
  width:100%;
}
.leader-tab{
  flex:1;
  text-align:center;
  border-radius:12px;
  background:var(--chip);
  color:var(--muted);
  box-shadow:none;
}
.leader-tab.active{
  background:var(--accent);
  color:#fff;
  border-color:transparent;
}

.filters,.sortrow{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:12px 14px 0;
  scrollbar-width:none;
}
.filters::-webkit-scrollbar,.sortrow::-webkit-scrollbar{display:none}
.filter,.sort{
  white-space:nowrap;
  padding:9px 13px;
  border-radius:999px;
  border:1px solid transparent;
  font-size:12px;
  font-weight:800;
  color:var(--text);
  background:var(--chip);
  box-shadow:none;
}
.sort{
  border-color:var(--line);
}
.sort.active{
  background:var(--accent);
  color:#fff;
  border-color:transparent;
}

.list{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:12px 14px 14px;
}
.item{
  border:1px solid var(--line);
  border-radius:18px;
  overflow:hidden;
  background:var(--card);
}
.item-main{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:10px;
  align-items:center;
  padding:12px;
  cursor:pointer;
}
.rank{
  width:32px;
  height:32px;
  border-radius:10px;
  background:color-mix(in srgb, var(--text) 10%, transparent);
  display:grid;
  place-items:center;
  font-size:12px;
  font-weight:900;
}
.item-info{min-width:0}
.row1{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.name{
  font-size:15px;
  font-weight:900;
  letter-spacing:-.02em;
}
.badge{
  font-size:11px;
  padding:4px 8px;
  border-radius:999px;
  font-weight:800;
  border:1px solid var(--line);
}
.row2{
  margin-top:4px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  color:var(--muted);
  font-size:12px;
}
.arrow{
  width:34px;
  height:34px;
  border-radius:50%;
  background:color-mix(in srgb, var(--text) 5%, transparent);
  display:grid;
  place-items:center;
  font-weight:900;
  border:1px solid var(--line);
}
.item-preview{
  display:none;
  border-top:1px solid var(--line);
  background:var(--preview);
  padding:12px;
}
.item.open .item-preview{display:block}
.preview-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}
.pbox{
  background:var(--preview2);
  border:1px solid var(--line);
  border-radius:14px;
  padding:10px;
}
.pbox .k{
  font-size:11px;
  color:var(--muted);
  margin-bottom:5px;
}
.pbox .v{
  font-size:14px;
  font-weight:900;
}
.preview-note{
  margin-top:10px;
  font-size:12px;
  line-height:1.55;
}
.empty{
  padding:28px 18px 30px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
  font-weight:700;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.5);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:40;
}
.overlay.show{display:flex}
.sheet{
  width:min(430px,100%);
  background:var(--card);
  border-radius:24px 24px 0 0;
  border:1px solid var(--line);
  box-shadow:0 -16px 32px rgba(0,0,0,.3);
  padding:14px;
  max-height:85vh;
  overflow:auto;
}
.sheet-head{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}
.sheet-head h3{
  margin:0;
  font-size:16px;
}
.field{margin-bottom:12px}
.field label{
  display:block;
  font-size:12px;
  font-weight:800;
  margin:0 0 6px;
}
.field input{
  width:100%;
  border:1px solid var(--line);
  border-radius:14px;
  padding:12px 14px;
  background:var(--bg);
  color:var(--text);
  outline:none;
}
.field input:focus{
  border-color:var(--accent2);
}
.btnrow{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}
.pill-toggle{
  padding:8px 12px;
  border-radius:999px;
  background:var(--chip);
  font-size:12px;
  font-weight:800;
}
.pill-toggle.active{
  background:#e53935;
  color:#fff;
  border-color:#e53935;
}
@media (max-width:390px){
  .item-main{grid-template-columns:auto 1fr}
  .arrow{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topline">
      <div class="titlebox">
        <h1 class="appname">국내주식 모니터</h1>
        <div class="mode-tabs" id="modeTabs">
          <button class="mode-tab active" data-mode="leader">주도섹터</button>
          <button class="mode-tab" data-mode="volume">거래량</button>
          <button class="mode-tab" data-mode="amount">거래대금</button>
        </div>
      </div>
      <div class="actions">
        <button id="themeBtn" class="iconbtn" aria-label="테마 변경" title="테마 변경"></button>
        <button id="settingBtn" class="iconbtn" aria-label="설정" title="설정">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 4.3l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06A2 2 0 1 1 19.71 7l-.06.06A1.65 1.65 0 0 0 19.4 9c.38.31.77.71 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </div>
    </div>

    <div class="card status-card">
      <div class="status-left">
        <div class="status-main">
          <span id="sourcePill" class="status-pill sample">샘플 데이터</span>
          <span id="sourceText">샘플 데이터 업데이트</span>
        </div>
        <div id="updatedText" class="status-time">업데이트 대기중</div>
        <div id="statusMessage" class="status-msg">데이터 상태를 확인 중입니다.</div>
      </div>
      <div class="live-box">
        <span id="apiIndicator" class="status-indicator yellow"></span>
        <span id="countdownText">갱신 15초</span>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="panel-head" id="leaderPanelHead">
      <div class="leader-tabs" id="leaderTabs">
        <button class="leader-tab active" data-type="테마">테마</button>
        <button class="leader-tab" data-type="업종">업종</button>
      </div>
    </div>
    <div class="filters" id="subFilters"></div>
    <div class="sortrow" id="sortrow"></div>
    <div class="list" id="listRoot"></div>
  </div>
</div>

<div class="overlay" id="settingsOverlay" aria-hidden="true">
  <div class="sheet">
    <div class="sheet-head">
      <h3>주도섹터 필터 설정</h3>
      <button id="closeSettingBtn">닫기</button>
    </div>

    <div class="field">
      <label>하위 분류 표시 개수</label>
      <input type="number" id="filterCount" min="1" max="999" />
    </div>
    <div class="field">
      <label>거래대금 최소 (억원)</label>
      <input type="number" id="thTradeAmt" min="0" step="100" />
    </div>
    <div class="field">
      <label>거래량 최소 (주)</label>
      <input type="number" id="thVolume2" min="0" step="100000" />
    </div>
    <div class="field">
      <label>시가총액 최소 (조원)</label>
      <input type="number" id="thMcap" min="0" step="0.5" />
    </div>
    <div class="field">
      <label>체결강도 최소 (%)</label>
      <input type="number" id="thStrength" min="0" step="1" />
    </div>
    <div class="field">
      <label>수급 조건</label>
      <div class="btnrow">
        <button id="toggleProgramPlus" class="pill-toggle">🔴 프로그램 플러스</button>
      </div>
    </div>
    <div class="btnrow">
      <button id="resetBtn" style="width:100%">설정 초기화</button>
    </div>
  </div>
</div>

<script>
const sunIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>';
const moonIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

const SORTS = ['거래대금','거래량','상승률','시총','변동성'];

const FALLBACK_LEADER = {
  categories: {
    테마: ['MLCC','2차전지','로봇','바이오','AI','우주항공','원전','신재생','보안','초전도체'],
    업종: ['반도체','자동차','금융','제약','철강','통신','화학','조선','건설','IT소프트웨어']
  },
  sectors: [
    {type:'테마',name:'삼화콘덴서',sector:'MLCC',reason:'AI/전장용 수요 급증',chg:'+29.9%',volume:'5,362억',marketCap:'1.6조',roi:'+29.9%',tradeVolume:5362000,strength:150,programNet:120000,stocks:[{name:'삼화콘덴서',price:'102,000',chg:'+29.9%'},{name:'아비코전자',price:'11,900',chg:'+8.1%'}]},
    {type:'테마',name:'에코프로',sector:'2차전지',reason:'ESS·리사이클 기대',chg:'+8.5%',volume:'8.7조',marketCap:'38조',roi:'+12.5%',tradeVolume:12000000,strength:120,programNet:320000,stocks:[{name:'에코프로',price:'121,000',chg:'+12.5%'},{name:'에코프로비엠',price:'238,000',chg:'+11.2%'}]},
    {type:'업종',name:'삼성전자',sector:'반도체',reason:'메모리 턴어라운드',chg:'+9.7%',volume:'12.5조',marketCap:'458조',roi:'+1.8%',tradeVolume:15000000,strength:125,programNet:920000,stocks:[{name:'삼성전자',price:'72,000',chg:'+1.8%'},{name:'SK하이닉스',price:'168,000',chg:'+2.3%'}]},
    {type:'업종',name:'SK하이닉스',sector:'반도체',reason:'HBM 독점적 지위',chg:'+9.1%',volume:'8.2조',marketCap:'122조',roi:'+2.6%',tradeVolume:8000000,strength:130,programNet:650000,stocks:[{name:'SK하이닉스',price:'168,000',chg:'+2.6%'},{name:'한미반도체',price:'182,000',chg:'+6.4%'}]}
  ],
  meta: { source:'sample', updatedAt:new Date().toISOString(), message:'클라이언트 내장 샘플' }
};

const FALLBACK_VOLUME = {
  items: [
    {market:'KOSPI',code:'005930',name:'삼성전자',price:72000,changeRate:1.69,changeValue:1200,changeSign:'2',volume:85230000,amount:6138000000},
    {market:'KOSDAQ',code:'247540',name:'에코프로비엠',price:238000,changeRate:2.15,changeValue:5000,changeSign:'2',volume:31200000,amount:7425600000}
  ],
  meta: { source:'sample', updatedAt:new Date().toISOString(), message:'클라이언트 내장 샘플' }
};

const FALLBACK_AMOUNT = {
  items: [
    {market:'KOSPI',code:'005490',name:'POSCO홀딩스',price:380000,changeRate:2.15,changeValue:8000,changeSign:'2',volume:42100000,amount:15998000000},
    {market:'KOSPI',code:'373220',name:'LG에너지솔루션',price:398000,changeRate:1.79,changeValue:7000,changeSign:'2',volume:17500000,amount:6965000000}
  ],
  meta: { source:'sample', updatedAt:new Date().toISOString(), message:'클라이언트 내장 샘플' }
};

const getSafeInt = (key, defaultVal) => {
  const val = localStorage.getItem(key);
  return val !== null && val !== '' ? parseInt(val, 10) : defaultVal;
};
const getSafeFloat = (key, defaultVal) => {
  const val = localStorage.getItem(key);
  return val !== null && val !== '' ? parseFloat(val) : defaultVal;
};

const state = {
  theme: localStorage.getItem('theme') || 'light',
  mode: 'leader',
  activeLeaderType: '테마',
  activeSubFilter: '전체',
  activeSort: '거래대금',
  openIndex: null,
  countdown: 15,
  timer: null,

  thTradeAmt: getSafeInt('thTradeAmt', 2000),
  thVolume2: getSafeInt('thVolume2', 2000000),
  thMcap: getSafeFloat('thMcap', 1),
  thStrength: getSafeFloat('thStrength', 100),
  filterCount: getSafeInt('filterCount', 5),
  programPlusOnly: localStorage.getItem('programPlusOnly') !== 'false',

  leader: FALLBACK_LEADER,
  volume: FALLBACK_VOLUME,
  amount: FALLBACK_AMOUNT
};

const el = {
  themeBtn: document.getElementById('themeBtn'),
  settingBtn: document.getElementById('settingBtn'),
  closeSettingBtn: document.getElementById('closeSettingBtn'),
  resetBtn: document.getElementById('resetBtn'),
  overlay: document.getElementById('settingsOverlay'),

  modeTabs: document.querySelectorAll('.mode-tab'),
  leaderTabs: document.querySelectorAll('.leader-tab'),
  leaderPanelHead: document.getElementById('leaderPanelHead'),
  subFilters: document.getElementById('subFilters'),
  sortrow: document.getElementById('sortrow'),
  listRoot: document.getElementById('listRoot'),

  sourcePill: document.getElementById('sourcePill'),
  sourceText: document.getElementById('sourceText'),
  updatedText: document.getElementById('updatedText'),
  statusMessage: document.getElementById('statusMessage'),
  apiIndicator: document.getElementById('apiIndicator'),
  countdownText: document.getElementById('countdownText'),

  filterCount: document.getElementById('filterCount'),
  thTradeAmt: document.getElementById('thTradeAmt'),
  thVolume2: document.getElementById('thVolume2'),
  thMcap: document.getElementById('thMcap'),
  thStrength: document.getElementById('thStrength'),
  toggleProgramPlus: document.getElementById('toggleProgramPlus')
};

function themeApply(t){
  document.documentElement.setAttribute('data-theme', t);
  el.themeBtn.innerHTML = t === 'light' ? moonIcon : sunIcon;
  localStorage.setItem('theme', t);
  state.theme = t;
}
function num(v){ return parseFloat(String(v).replace(/[^0-9.\-]/g,'')) || 0; }
function numTri(v){
  const s = String(v).replace(/,/g,'');
  const m = s.match(/([0-9.]+)(조|억)?/);
  if(!m) return 0;
  const n = parseFloat(m[1]);
  if(m[2] === '조') return n * 10000;
  if(m[2] === '억') return n;
  return n;
}
function formatTime(iso){
  if(!iso) return '업데이트 대기중';
  const d = new Date(iso);
  return d.toLocaleTimeString('ko-KR');
}
function formatPrice(v){
  return `${Number(v || 0).toLocaleString()}원`;
}
function formatVolume(v){
  const n = Number(v || 0);
  if (n >= 100000000) return `${(n/100000000).toFixed(1)}억주`;
  if (n >= 10000000) return `${(n/10000000).toFixed(1)}천만주`;
  if (n >= 10000) return `${Math.round(n/10000).toLocaleString()}만주`;
  return `${n.toLocaleString()}주`;
}
function formatAmount(v){
  const n = Number(v || 0);
  if (n >= 1000000000000) return `${(n/1000000000000).toFixed(1)}조`;
  if (n >= 100000000) return `${Math.round(n/100000000).toLocaleString()}억`;
  if (n >= 10000) return `${Math.round(n/10000).toLocaleString()}만`;
  return n.toLocaleString();
}
function getColorVar(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return `var(--c-${(Math.abs(hash) % 8) + 1})`;
}
function getBgVar(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
  return `color-mix(in srgb, var(--c-${(Math.abs(hash) % 8) + 1}) var(--bg-mix, 15%), var(--card))`;
}

function getCurrentDataset() {
  if (state.mode === 'leader') return state.leader;
  if (state.mode === 'volume') return state.volume;
  return state.amount;
}

function renderStatus(){
  const current = getCurrentDataset();
  const source = current.meta?.source === 'real' ? 'real' : 'sample';
  const label = source === 'real' ? '실데이터' : '샘플 데이터';

  el.sourcePill.className = `status-pill ${source}`;
  el.sourcePill.textContent = label;
  el.sourceText.textContent = `${label} 업데이트`;
  el.updatedText.textContent = `${label} 시간 ${formatTime(current.meta?.updatedAt)}`;
  el.statusMessage.textContent = current.meta?.message || '';
  el.apiIndicator.className = `status-indicator ${source === 'real' ? 'green' : 'yellow'}`;
  el.countdownText.textContent = `갱신 ${state.countdown}초`;
}

function getLeaderThresholds(){
  return {
    amt: el.thTradeAmt.value !== '' ? parseFloat(el.thTradeAmt.value) : state.thTradeAmt,
    vol: el.thVolume2.value !== '' ? parseFloat(el.thVolume2.value) : state.thVolume2,
    mcap: el.thMcap.value !== '' ? parseFloat(el.thMcap.value) : state.thMcap,
    str: el.thStrength.value !== '' ? parseFloat(el.thStrength.value) : state.thStrength
  };
}

function passesLeaderFilter(sec){
  const t = getLeaderThresholds();
  const okAmt = numTri(sec.volume) >= t.amt;
  const okVol = Number(sec.tradeVolume || 0) >= t.vol;
  const okMcap = numTri(sec.marketCap) >= (t.mcap * 10000);
  const okStr = Number(sec.strength || 0) >= t.str;
  const okProg = !state.programPlusOnly || Number(sec.programNet || 0) > 0;
  return okAmt && okVol && okMcap && okStr && okProg;
}

function getLeaderItems(){
  let list = (state.leader.sectors || [])
    .filter((x) => x.type === state.activeLeaderType)
    .filter(passesLeaderFilter);

  const sorter = {
    '거래대금': (a,b) => numTri(b.volume) - numTri(a.volume),
    '거래량': (a,b) => Number(b.tradeVolume || 0) - Number(a.tradeVolume || 0),
    '상승률': (a,b) => num(b.chg) - num(a.chg),
    '시총': (a,b) => numTri(b.marketCap) - numTri(a.marketCap),
    '변동성': (a,b) => (b.name || '').length - (a.name || '').length
  }[state.activeSort] || ((a,b) => numTri(b.volume) - numTri(a.volume));

  list.sort(sorter);

  if (state.activeSubFilter !== '전체') {
    list = list.filter((x) => x.sector === state.activeSubFilter);
  }
  return list;
}

function renderSubFilters(){
  el.subFilters.innerHTML = '';
  if (state.mode !== 'leader') {
    el.subFilters.style.display = 'none';
    el.sortrow.style.display = 'none';
    el.leaderPanelHead.style.display = 'none';
    return;
  }

  el.subFilters.style.display = 'flex';
  el.sortrow.style.display = 'flex';
  el.leaderPanelHead.style.display = 'flex';

  const categoryList = state.leader.categories?.[state.activeLeaderType] || [];
  const display = ['전체', ...categoryList.slice(0, state.filterCount)];

  display.forEach((x) => {
    const b = document.createElement('button');
    b.className = 'filter';
    b.textContent = x;
    const active = state.activeSubFilter === x;

    if (x === '전체') {
      b.style.background = active ? 'var(--accent)' : 'var(--chip)';
      b.style.color = active ? '#fff' : 'var(--text)';
      b.style.borderColor = active ? 'transparent' : 'var(--line)';
    } else {
      const color = getColorVar(x);
      b.style.background = active ? color : `color-mix(in srgb, ${color} 18%, var(--chip))`;
      b.style.color = active ? '#000' : 'var(--text)';
      b.style.borderColor = active ? color : `color-mix(in srgb, ${color} 40%, transparent)`;
    }

    b.onclick = () => {
      state.activeSubFilter = x;
      state.openIndex = null;
      renderAll();
    };
    el.subFilters.appendChild(b);
  });
}

function renderSorts(){
  el.sortrow.innerHTML = '';
  if (state.mode !== 'leader') return;

  SORTS.forEach((x) => {
    const b = document.createElement('button');
    b.className = 'sort' + (state.activeSort === x ? ' active' : '');
    b.textContent = x;
    b.onclick = () => {
      state.activeSort = x;
      state.openIndex = null;
      renderAll();
    };
    el.sortrow.appendChild(b);
  });
}

function renderLeaderList(){
  const items = getLeaderItems();
  el.listRoot.innerHTML = '';
  if (!items.length) {
    el.listRoot.innerHTML = '<div class="empty">조건에 맞는 주도섹터가 없습니다.</div>';
    return;
  }

  items.forEach((sec, idx) => {
    const open = state.openIndex === idx;
    const item = document.createElement('div');
    const color = getColorVar(sec.sector);
    item.className = 'item' + (open ? ' open' : '');
    item.style.background = getBgVar(sec.sector);

    item.innerHTML = `
      <div class="item-main">
        <div class="rank">${idx + 1}</div>
        <div class="item-info">
          <div class="row1">
            <div class="name">${sec.name}</div>
            <span class="badge">${sec.sector}</span>
          </div>
          <div class="row2">
            <span>거래대금 ${sec.volume}</span>
            <span>거래량 ${formatVolume(sec.tradeVolume)}</span>
            <span>상승률 ${sec.chg}</span>
          </div>
        </div>
        <div class="arrow">${open ? '−' : '＋'}</div>
      </div>
      <div class="item-preview">
        <div class="preview-grid">
          <div class="pbox"><div class="k">현재가 기준</div><div class="v">${sec.stocks?.[0]?.price || '-'}</div></div>
          <div class="pbox"><div class="k">등락률</div><div class="v">${sec.chg}</div></div>
          <div class="pbox"><div class="k">거래대금</div><div class="v">${sec.volume}</div></div>
          <div class="pbox"><div class="k">시가총액</div><div class="v">${sec.marketCap}</div></div>
        </div>
        <div class="preview-note">핵심 포인트: ${sec.reason}<br>관련 종목: ${(sec.stocks || []).map((x) => x.name).join(' · ')}</div>
      </div>
    `;

    const badge = item.querySelector('.badge');
    badge.style.background = `color-mix(in srgb, ${color} 15%, transparent)`;
    badge.style.color = color;
    badge.style.borderColor = `color-mix(in srgb, ${color} 40%, transparent)`;

    item.querySelector('.item-main').onclick = () => {
      state.openIndex = state.openIndex === idx ? null : idx;
      renderAll();
    };

    el.listRoot.appendChild(item);
  });
}

function renderRankList(kind){
  const dataset = kind === 'volume' ? state.volume : state.amount;
  const items = dataset.items || [];
  const accent = kind === 'volume' ? 'var(--cyan)' : 'var(--violet)';

  el.listRoot.innerHTML = '';
  if (!items.length) {
    el.listRoot.innerHTML = '<div class="empty">수신된 순위 데이터가 없습니다.</div>';
    return;
  }

  items.forEach((row, idx) => {
    const open = state.openIndex === idx;
    const item = document.createElement('div');
    item.className = 'item' + (open ? ' open' : '');

    item.innerHTML = `
      <div class="item-main">
        <div class="rank" style="background:color-mix(in srgb, ${accent} 18%, transparent); color:${accent};">${idx + 1}</div>
        <div class="item-info">
          <div class="row1">
            <div class="name">${row.name}</div>
            <span class="badge" style="background:color-mix(in srgb, ${accent} 12%, transparent); color:${accent}; border-color:color-mix(in srgb, ${accent} 35%, transparent);">${row.market}</span>
          </div>
          <div class="row2">
            <span>${kind === 'volume' ? '거래량' : '거래대금'} ${kind === 'volume' ? formatVolume(row.volume) : formatAmount(row.amount)}</span>
            <span>${kind === 'volume' ? '거래대금' : '거래량'} ${kind === 'volume' ? formatAmount(row.amount) : formatVolume(row.volume)}</span>
            <span>등락률 ${row.changeRate > 0 ? '+' : ''}${row.changeRate}%</span>
          </div>
        </div>
        <div class="arrow">${open ? '−' : '＋'}</div>
      </div>
      <div class="item-preview">
        <div class="preview-grid">
          <div class="pbox"><div class="k">종목코드</div><div class="v">${row.code || '-'}</div></div>
          <div class="pbox"><div class="k">현재가</div><div class="v">${formatPrice(row.price)}</div></div>
          <div class="pbox"><div class="k">거래량</div><div class="v">${formatVolume(row.volume)}</div></div>
          <div class="pbox"><div class="k">거래대금</div><div class="v">${formatAmount(row.amount)}</div></div>
        </div>
        <div class="preview-note">
          시장: ${row.market}<br>
          전일대비: ${row.changeValue > 0 ? '+' : ''}${Number(row.changeValue || 0).toLocaleString()}원 / ${row.changeRate > 0 ? '+' : ''}${row.changeRate}%
        </div>
      </div>
    `;

    item.querySelector('.item-main').onclick = () => {
      state.openIndex = state.openIndex === idx ? null : idx;
      renderAll();
    };

    el.listRoot.appendChild(item);
  });
}

function renderAll(){
  renderStatus();
  renderSubFilters();
  renderSorts();

  el.modeTabs.forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.mode === state.mode);
  });
  el.leaderTabs.forEach((btn) => {
    btn.classList.toggle('active', btn.dataset.type === state.activeLeaderType);
  });

  if (state.mode === 'leader') renderLeaderList();
  if (state.mode === 'volume') renderRankList('volume');
  if (state.mode === 'amount') renderRankList('amount');
}

function saveSettings(){
  state.thTradeAmt = el.thTradeAmt.value === '' ? state.thTradeAmt : parseFloat(el.thTradeAmt.value);
  state.thVolume2 = el.thVolume2.value === '' ? state.thVolume2 : parseFloat(el.thVolume2.value);
  state.thMcap = el.thMcap.value === '' ? state.thMcap : parseFloat(el.thMcap.value);
  state.thStrength = el.thStrength.value === '' ? state.thStrength : parseFloat(el.thStrength.value);
  state.filterCount = el.filterCount.value === '' ? state.filterCount : parseInt(el.filterCount.value, 10);

  localStorage.setItem('thTradeAmt', state.thTradeAmt);
  localStorage.setItem('thVolume2', state.thVolume2);
  localStorage.setItem('thMcap', state.thMcap);
  localStorage.setItem('thStrength', state.thStrength);
  localStorage.setItem('filterCount', state.filterCount);
  localStorage.setItem('programPlusOnly', String(state.programPlusOnly));
}

function openSettings(){
  el.filterCount.value = state.filterCount;
  el.thTradeAmt.value = state.thTradeAmt;
  el.thVolume2.value = state.thVolume2;
  el.thMcap.value = state.thMcap;
  el.thStrength.value = state.thStrength;
  el.toggleProgramPlus.classList.toggle('active', state.programPlusOnly);
  el.overlay.classList.add('show');
}
function closeSettings(){
  saveSettings();
  el.overlay.classList.remove('show');
  renderAll();
}

async function safeJson(url, fallback) {
  try {
    const res = await fetch(url, { cache: 'no-store' });
    const text = await res.text();
    const json = JSON.parse(text);
    return json;
  } catch (e) {
    return fallback;
  }
}

async function fetchAllData(){
  state.countdown = 15;
  el.apiIndicator.className = 'status-indicator yellow';
  el.countdownText.textContent = `갱신 ${state.countdown}초`;

  const [leaderData, volumeData, amountData] = await Promise.all([
    safeJson('/api/data', FALLBACK_LEADER),
    safeJson('/api/market/volume-top', FALLBACK_VOLUME),
    safeJson('/api/market/amount-top', FALLBACK_AMOUNT)
  ]);

  state.leader = leaderData && Array.isArray(leaderData.sectors) ? leaderData : FALLBACK_LEADER;
  state.volume = volumeData && Array.isArray(volumeData.items) ? volumeData : FALLBACK_VOLUME;
  state.amount = amountData && Array.isArray(amountData.items) ? amountData : FALLBACK_AMOUNT;

  const current = getCurrentDataset();
  el.apiIndicator.className = `status-indicator ${current.meta?.source === 'real' ? 'green' : 'yellow'}`;
  renderAll();
}

function startPolling(){
  clearInterval(state.timer);
  state.timer = setInterval(() => {
    state.countdown = Math.max(0, state.countdown - 1);
    renderStatus();
    if (state.countdown === 0) fetchAllData();
  }, 1000);
}

el.modeTabs.forEach((btn) => {
  btn.onclick = () => {
    state.mode = btn.dataset.mode;
    state.openIndex = null;
    renderAll();
  };
});
el.leaderTabs.forEach((btn) => {
  btn.onclick = () => {
    state.activeLeaderType = btn.dataset.type;
    state.activeSubFilter = '전체';
    state.openIndex = null;
    renderAll();
  };
});

el.themeBtn.onclick = () => themeApply(state.theme === 'light' ? 'dark' : 'light');
el.settingBtn.onclick = openSettings;
el.closeSettingBtn.onclick = closeSettings;
el.resetBtn.onclick = () => {
  state.thTradeAmt = 2000;
  state.thVolume2 = 2000000;
  state.thMcap = 1;
  state.thStrength = 100;
  state.filterCount = 5;
  state.programPlusOnly = true;
  openSettings();
};
el.toggleProgramPlus.onclick = () => {
  state.programPlusOnly = !state.programPlusOnly;
  el.toggleProgramPlus.classList.toggle('active', state.programPlusOnly);
};
el.overlay.addEventListener('click', (e) => {
  if (e.target === el.overlay) closeSettings();
});

themeApply(state.theme);
renderAll();
fetchAllData();
startPolling();
</script>
</body>
</html>
