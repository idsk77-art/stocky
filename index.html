<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>섹터모니터 - 주도섹터 / 대금상위</title>
<style>
/* ─── 색상 시스템 ──────────────────────────── */
:root{
  --bg:#f4f5f8;
  --surface:#ffffff;
  --surface2:#f8f9fc;
  --border:#e8eaf0;
  --text:#1a1d2e;
  --sub:#7e8aaa;
  --red:#e8303a;
  --red-bg:#fff3f4;
  --blue:#2060e0;
  --blue-bg:#f0f4ff;
  --green:#17a663;
  --green-bg:#f0faf5;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  /* 섹터별 컬러 */
  --battery:#e8303a;   --battery-bg:#fff3f4;
  --mlcc:#8d33d4;      --mlcc-bg:#f6f0ff;
  --semi:#2060e0;      --semi-bg:#f0f4ff;
  --bio:#17a663;       --bio-bg:#f0faf5;
  --robot:#e07a20;     --robot-bg:#fff6ed;
  --energy:#0ea5c9;    --energy-bg:#f0faff;
  --quantum:#c026b0;   --quantum-bg:#fdf0fd;
  --default:#475569;   --default-bg:#f1f5f9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:Apple SD Gothic Neo,Malgun Gothic,sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
}
button,select,input{font:inherit;cursor:pointer}

/* ─── 최상단 탭 헤더 ──────────────────────── */
.top-nav{
  background:#fff;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:40;
}
.nav-inner{
  max-width:900px;margin:0 auto;
  display:flex;align-items:center;gap:0;
  padding:0 16px;
}
.nav-logo{
  font-weight:800;font-size:17px;
  color:var(--text);padding:0 14px 0 0;
  border-right:1px solid var(--border);
  margin-right:4px;
}
.nav-tab{
  border:none;background:none;
  color:var(--sub);font-size:15px;font-weight:500;
  padding:16px 14px;border-bottom:2px solid transparent;
  transition:.15s;
}
.nav-tab.active{color:var(--text);border-bottom-color:var(--text);font-weight:700}
.nav-right{
  margin-left:auto;display:flex;align-items:center;gap:8px;
}
.nav-btn{
  background:none;border:1px solid var(--border);
  color:var(--sub);border-radius:8px;padding:7px 12px;font-size:13px;
}
.nav-btn.accent{
  background:var(--text);color:#fff;border-color:var(--text);
}
.countdown{font-size:12px;color:var(--sub)}
.market-badge{
  font-size:12px;padding:4px 10px;border-radius:20px;font-weight:600;
  background:#edfcf2;color:var(--green);border:1px solid #c3f2da;
}

/* ─── 래퍼 ───────────────────────────────── */
.wrap{max-width:900px;margin:0 auto;padding:16px}

/* ─── 섹터 칩 ────────────────────────────── */
.sector-row{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
  scrollbar-width:none;
}
.sector-row::-webkit-scrollbar{display:none}
.s-chip{
  white-space:nowrap;flex:0 0 auto;
  border:1.5px solid var(--border);background:#fff;
  border-radius:999px;padding:9px 16px;font-size:13px;
  color:var(--sub);font-weight:500;transition:.15s;
}
.s-chip.active{font-weight:700;color:#fff}
.s-chip[data-sector=all].active{background:var(--text);border-color:var(--text)}
.s-chip[data-sector=battery].active{background:var(--battery);border-color:var(--battery)}
.s-chip[data-sector=mlcc].active{background:var(--mlcc);border-color:var(--mlcc)}
.s-chip[data-sector=semi].active{background:var(--semi);border-color:var(--semi)}
.s-chip[data-sector=bio].active{background:var(--bio);border-color:var(--bio)}
.s-chip[data-sector=robot].active{background:var(--robot);border-color:var(--robot)}
.s-chip[data-sector=energy].active{background:var(--energy);border-color:var(--energy)}
.s-chip[data-sector=quantum].active{background:var(--quantum);border-color:var(--quantum)}

/* ─── 필터/정렬 바 ───────────────────────── */
.filter-bar{
  margin-top:12px;
  background:#fff;border:1px solid var(--border);
  border-radius:14px;padding:12px 14px;
  display:flex;gap:8px;align-items:center;flex-wrap:wrap;
}
.f-label{font-size:12px;color:var(--sub)}
.f-chip{
  border:1px solid var(--border);background:var(--surface2);
  border-radius:999px;padding:6px 14px;font-size:13px;color:var(--sub);
}
.f-chip.active{
  background:var(--red-bg);border-color:#f5bdc0;color:var(--red);font-weight:700;
}
.r-sort{
  margin-left:auto;background:var(--surface2);
  border:1px solid var(--border);border-radius:10px;padding:7px 10px;font-size:13px;
  color:var(--text);
}

/* ─── 뉴스 배너 ──────────────────────────── */
.news-bar{
  margin-top:12px;
  background:#fff;border:1px solid #dbeafe;
  border-radius:12px;padding:10px 14px;
  font-size:13px;color:#2563eb;
  display:flex;gap:8px;align-items:center;overflow:hidden;
}
.news-tag{
  flex:0 0 auto;background:#2563eb;color:#fff;
  font-size:11px;font-weight:700;padding:3px 8px;border-radius:6px;
}
.news-scroll{
  white-space:nowrap;
  animation:scroll-left 22s linear infinite;
}
@keyframes scroll-left{
  0%{transform:translateX(60%)}
  100%{transform:translateX(-100%)}
}

/* ─── 섹션 헤더 ──────────────────────────── */
.section-head{
  margin-top:16px;margin-bottom:10px;
  display:flex;justify-content:space-between;align-items:center;
}
.section-title{font-weight:700;font-size:15px}
.section-time{font-size:12px;color:var(--sub)}

/* ─── 종목 리스트 & 카드 ─────────────────── */
.stock-list{display:flex;flex-direction:column;gap:0}
.s-card{
  background:#fff;
  border:1px solid var(--border);
  border-radius:0;margin-top:-1px;
  overflow:hidden;
  transition:box-shadow .15s;
}
.s-card:first-child{border-radius:14px 14px 0 0}
.s-card:last-child{border-radius:0 0 14px 14px}
.s-card:only-child{border-radius:14px}
.s-card.open{
  box-shadow:var(--shadow-lg);z-index:2;position:relative;
  border-radius:14px!important;margin-top:8px!important;margin-bottom:8px!important;
}
.s-row{
  display:grid;
  grid-template-columns:28px 1fr auto auto auto;
  gap:10px;align-items:center;
  padding:14px 16px;cursor:pointer;
  user-select:none;
}
.s-row:hover{background:var(--surface2)}

.rank{font-size:13px;font-weight:700;color:var(--sub);text-align:center;}
.rank.top{color:var(--text)}
.s-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:6px}
.s-meta{font-size:12px;color:var(--sub);margin-top:3px;display:flex;gap:6px;align-items:center}

/* 섹터 태그 */
.sector-tag{font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;}
.tag-battery{color:var(--battery);background:var(--battery-bg)}
.tag-mlcc{color:var(--mlcc);background:var(--mlcc-bg)}
.tag-semi{color:var(--semi);background:var(--semi-bg)}
.tag-bio{color:var(--bio);background:var(--bio-bg)}
.tag-robot{color:var(--robot);background:var(--robot-bg)}
.tag-energy{color:var(--energy);background:var(--energy-bg)}
.tag-quantum{color:var(--quantum);background:var(--quantum-bg)}
.tag-default{color:var(--default);background:var(--default-bg)}

/* 상한가 뱃지 */
.limit-badge{
  font-size:11px;font-weight:800;
  padding:3px 7px;border-radius:6px;
  background:#fff3c4;color:#a16207;border:1px solid #fde68a;
}
.s-price{font-size:17px;font-weight:800;color:var(--red);text-align:right;}
.s-change{font-size:14px;font-weight:700;color:var(--red);text-align:right;min-width:72px;}
.s-vol{font-size:13px;color:var(--sub);text-align:right;min-width:72px;}

/* ─── 인라인 확장 패널 ───────────────────── */
.inline-panel{
  display:none;
  border-top:1px solid var(--border);
  background:var(--surface2);
  padding:16px;
}
.s-card.open .inline-panel{display:block}
.inline-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:10px;margin-bottom:14px;
}
@media(max-width:560px){.inline-grid{grid-template-columns:repeat(2,1fr)}}
.info-box{
  background:#fff;border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;
}
.info-box .ib-label{font-size:11px;color:var(--sub);margin-bottom:4px}
.info-box .ib-val{font-size:15px;font-weight:700}
.info-box .ib-val.red{color:var(--red)}
.info-box .ib-val.blue{color:var(--blue)}
.inline-actions{display:flex;gap:8px;}
.ia-btn{
  flex:1;border:1.5px solid var(--border);background:#fff;
  border-radius:10px;padding:10px;font-size:13px;font-weight:600;
  color:var(--text);transition:.15s;
}
.ia-btn:hover{border-color:var(--text);background:var(--text);color:#fff}

/* ─── 전체화면 모달 ──────────────────────── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.35);z-index:100;
  align-items:flex-end;justify-content:center;
}
.modal-overlay.open{display:flex}
.modal-sheet{
  width:100%;max-width:900px;
  max-height:92vh;overflow-y:auto;
  background:#fff;border-radius:22px 22px 0 0;
  box-shadow:var(--shadow-lg);
  animation:slide-up .25s ease;
}
@keyframes slide-up{
  from{transform:translateY(60px);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.modal-handle{
  width:40px;height:4px;background:var(--border);
  border-radius:4px;margin:12px auto 0;
}
.modal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px 14px;border-bottom:1px solid var(--border);
}
.modal-name{font-size:20px;font-weight:800}
.modal-close{
  width:32px;height:32px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface2);
  font-size:16px;color:var(--sub);
  display:flex;align-items:center;justify-content:center;
}
.modal-body{padding:20px}
.modal-price-row{display:flex;align-items:flex-end;gap:12px;margin-bottom:20px;}
.modal-price{font-size:34px;font-weight:900;color:var(--red)}
.modal-change-wrap{display:flex;flex-direction:column;gap:3px}
.modal-change{font-size:17px;font-weight:700;color:var(--red)}
.modal-change-abs{font-size:14px;color:var(--sub)}
.modal-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  margin-bottom:20px;
}
@media(max-width:560px){.modal-grid{grid-template-columns:repeat(2,1fr)}}
.modal-box{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;padding:12px 14px;
}
.modal-box .mb-label{font-size:12px;color:var(--sub);margin-bottom:5px}
.modal-box .mb-val{font-size:16px;font-weight:700}
.mb-val.red{color:var(--red)}
.mb-val.blue{color:var(--blue)}
.modal-section{margin-bottom:20px;}
.modal-section-title{
  font-size:14px;font-weight:700;color:var(--sub);
  margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);
}
.chart-placeholder{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:12px;height:160px;
  display:flex;align-items:center;justify-content:center;
  color:var(--sub);font-size:13px;margin-bottom:20px;
}

/* 호가창 */
.orderbook{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ob-title{font-size:12px;font-weight:700;text-align:center;padding:6px;border-radius:8px 8px 0 0}
.ob-title.ask{background:#f0f4ff;color:var(--blue)}
.ob-title.bid{background:#fff3f4;color:var(--red)}
.ob-row{
  display:grid;grid-template-columns:1fr 1fr;
  padding:7px 10px;font-size:13px;border-bottom:1px solid var(--border);
}
.ob-row .p{font-weight:700}
.ob-row .q{text-align:right;color:var(--sub)}
.ob-row.ask .p{color:var(--blue)}
.ob-row.bid .p{color:var(--red)}

/* ─── 유틸 ───────────────────────────────── */
.hidden{display:none}
.empty{
  text-align:center;padding:60px 20px;color:var(--sub);font-size:14px;
  background:#fff;border-radius:14px;border:1px solid var(--border);
}
.toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--text);color:#fff;
  padding:10px 18px;border-radius:10px;font-size:13px;z-index:200;
  box-shadow:var(--shadow-lg);
}
@media(max-width:640px){
  .s-vol{display:none}
  .s-row{grid-template-columns:24px 1fr auto auto}
  .modal-price{font-size:26px}
}
</style>
</head>
<body>

<!-- ─── 상단 내비 ─────────────────────────── -->
<nav class="top-nav">
  <div class="nav-inner">
    <span class="nav-logo">📊 섹터모니터</span>
    <button class="nav-tab active" data-tab="sector">주도섹터</button>
    <button class="nav-tab" data-tab="volume">대금상위</button>
    <button class="nav-tab" data-tab="calendar">캘린더</button>
    <button class="nav-tab" data-tab="notice">공지</button>
    <div class="nav-right">
      <span class="market-badge" id="marketStatus">● 장중</span>
      <span class="countdown" id="countdown">30s</span>
      <button class="nav-btn" onclick="refreshData()">🔄</button>
      <button class="nav-btn accent" onclick="openSettings()">환경설정</button>
    </div>
  </div>
</nav>

<!-- ─── 주도섹터 탭 ───────────────────────── -->
<div class="wrap" id="tab-sector">
  <div class="sector-row" id="sectorMenu">
    <button class="s-chip active" data-sector="all">전체</button>
    <button class="s-chip" data-sector="battery">2차전지</button>
    <button class="s-chip" data-sector="mlcc">MLCC</button>
    <button class="s-chip" data-sector="semi">반도체</button>
    <button class="s-chip" data-sector="bio">바이오</button>
    <button class="s-chip" data-sector="robot">로봇</button>
    <button class="s-chip" data-sector="energy">신재생</button>
    <button class="s-chip" data-sector="quantum">양자</button>
  </div>

  <div class="filter-bar">
    <span class="f-label">등락률</span>
    <button class="f-chip active" data-change="4">4%↑</button>
    <button class="f-chip" data-change="3">3%↑</button>
    <button class="f-chip" data-change="2">2%↑</button>
    <button class="f-chip" data-change="0">전체</button>
    <select class="r-sort" id="sectorSort" onchange="renderSector()">
      <option value="volume">거래대금순</option>
      <option value="change">등락률순</option>
      <option value="price">현재가순</option>
    </select>
  </div>

  <div class="news-bar">
    <span class="news-tag">뉴스</span>
    <span class="news-scroll">올해 2차전지 ESS 모멘텀 본격화…내년에 실적 성장까지 &nbsp;/&nbsp; 삼성전기, AI 부품 기대감에 신고가…증권가 목표가 줄상향 &nbsp;/&nbsp; 반도체 장비주 수주 모멘텀 지속</span>
  </div>

  <div class="section-head">
    <div class="section-title">거래대금 상위 <span id="filterLabel">4</span>% 이상 상승종목</div>
    <div class="section-time" id="updateTime1">--:--:--</div>
  </div>
  <div class="stock-list" id="sectorList"></div>
</div>

<!-- ─── 대금상위 탭 ───────────────────────── -->
<div class="wrap hidden" id="tab-volume">
  <div class="filter-bar" style="margin-top:0">
    <span class="f-label">시장</span>
    <button class="f-chip active">전체</button>
    <button class="f-chip">KOSPI</button>
    <button class="f-chip">KOSDAQ</button>
    <select class="r-sort" id="volumeSort" onchange="renderVolume()">
      <option value="volume">거래대금순</option>
      <option value="change">등락률순</option>
      <option value="price">현재가순</option>
    </select>
  </div>
  <div class="section-head">
    <div class="section-title">거래대금 TOP 종목</div>
    <div class="section-time" id="updateTime2">--:--:--</div>
  </div>
  <div class="stock-list" id="volumeList"></div>
</div>

<!-- ─── 캘린더 탭 ───────────────────────── -->
<div class="wrap hidden" id="tab-calendar">
  <div class="empty">📅 경제지표 / 공시 캘린더 — 준비 중</div>
</div>

<!-- ─── 공지 탭 ─────────────────────────── -->
<div class="wrap hidden" id="tab-notice">
  <div class="empty">📢 공지사항 — 준비 중</div>
</div>

<!-- ─── 전체화면 상세 모달 ───────────────── -->
<div class="modal-overlay" id="detailModal" onclick="handleModalBackdrop(event)">
  <div class="modal-sheet" id="modalSheet">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div>
        <div class="modal-name" id="modalName">종목명</div>
        <div style="margin-top:4px;display:flex;gap:6px;align-items:center">
          <span id="modalSectorTag" class="sector-tag"></span>
          <span style="font-size:12px;color:var(--sub)" id="modalCode"></span>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-price-row">
        <div class="modal-price" id="modalPrice">-</div>
        <div class="modal-change-wrap">
          <div class="modal-change" id="modalChange">-</div>
          <div class="modal-change-abs" id="modalChangeAbs">전일대비 -</div>
        </div>
      </div>
      <div class="chart-placeholder">📈 실시간 차트 (KIS WebSocket 연동 후 활성화)</div>
      <div class="modal-grid" id="modalGrid"></div>
      <div class="modal-section">
        <div class="modal-section-title">호가창 (샘플)</div>
        <div class="orderbook" id="modalOrderbook"></div>
      </div>
      <div class="modal-section">
        <div class="modal-section-title">기업 정보</div>
        <div id="modalCompanyInfo"></div>
      </div>
    </div>
  </div>
</div>

<!-- ─── 환경설정 모달 ─────────────────────── -->
<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal-sheet" style="max-height:88vh">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-name">환경설정</div>
      <button class="modal-close" onclick="closeSettings()">✕</button>
    </div>
    <div class="modal-body">
      <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:14px;margin-bottom:18px">
        <div style="font-size:13px;font-weight:700;color:#2563eb;margin-bottom:10px">🔑 KIS OpenAPI</div>
        <input id="appKey" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:8px;font-size:13px" placeholder="App Key" type="text"/>
        <input id="appSecret" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:8px;font-size:13px" placeholder="App Secret" type="password"/>
        <input id="accountNo" style="width:100%;border:1px solid var(--border);border-radius:8px;padding:9px 12px;margin-bottom:10px;font-size:13px" placeholder="계좌번호 예: 50012345-01" type="text"/>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <label style="display:flex;gap:6px;align-items:center;font-size:13px">
            <input type="checkbox" id="mockMode" checked/> 모의투자 모드
          </label>
          <button onclick="testApi()" style="background:#2563eb;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px">연결 테스트</button>
        </div>
        <div id="apiStatus" style="font-size:12px;margin-top:8px;color:var(--sub)">미연결</div>
      </div>
      <div id="settingRows"></div>
    </div>
    <div style="display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border)">
      <button onclick="resetSettings()" style="flex:0 0 auto;border:1px solid var(--border);background:var(--surface2);border-radius:10px;padding:12px 16px;font-size:14px">초기화</button>
      <button onclick="saveSettings()" style="flex:1;background:var(--text);color:#fff;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700">저장 적용</button>
    </div>
  </div>
</div>

let S={
  currentSector:'all', currentTab:'sector',
  minChange:4, minVolume:0, maxItems:30,
  limitUpTop:true, autoRefresh:true,
  refreshInterval:30, appKey:'', appSecret:'',
  accountNo:'', mockMode:true,
  alertChange:15, limitUpAlert:true, showNews:true,
  countdown:30, timer:null, openCardCode:null,
};

function loadSettings(){
  const sv=localStorage.getItem('smv2');
  if(sv)Object.assign(S,JSON.parse(sv));
  S.countdown=S.refreshInterval;
}
function saveSettings(){
  S.appKey=v('appKey'); S.appSecret=v('appSecret');
  S.accountNo=v('accountNo'); S.mockMode=c('mockMode');
  S.autoRefresh=c('autoRefresh');
  S.refreshInterval=Math.max(5,n('si_refresh')||30);
  S.minChange=n('si_minChange')||0;
  S.minVolume=n('si_minVol')||0;
  S.maxItems=n('si_maxItems')||20;
  S.limitUpTop=c('si_limitTop');
  S.alertChange=n('si_alertChange')||15;
  S.limitUpAlert=c('si_alertLimit');
  S.showNews=c('si_news');
  localStorage.setItem('smv2',JSON.stringify(S));
  closeSettings(); renderAll(); startTimer();
  toast('설정이 저장되었습니다 ✓');
}
function resetSettings(){
  if(confirm('설정을 초기화할까요?')){
    localStorage.removeItem('smv2'); location.reload();
  }
}
function v(id){return (document.getElementById(id)||{}).value||''}
function c(id){return !!(document.getElementById(id)||{}).checked}
function n(id){return parseFloat(v(id))||0}

/* ═══════════════════════════════════════
   렌더링
═══════════════════════════════════════ */
function getFiltered(sector){
  let d = sector==='all' ? allStocks() : (STOCKS[sector]||[]);
  d = d.filter(x=>x.change>=S.minChange && x.volume>=S.minVolume);
  const sk=(document.getElementById('sectorSort')||{}).value||'volume';
  d.sort((a,b)=>{
    if(S.limitUpTop && a.limitUp!==b.limitUp) return b.limitUp-a.limitUp;
    if(sk==='change') return b.change-a.change;
    if(sk==='price')  return b.price-a.price;
    return b.volume-a.volume;
  });
  return d.slice(0,S.maxItems);
}

function fmtPrice(v){return Number(v).toLocaleString('ko-KR')}
function fmtVol(v){
  if(v>=10000) return (v/10000).toFixed(2)+'조';
  return Number(v).toLocaleString('ko-KR')+'억';
}

function buildCard(row,rank){

  const isOpen=S.openCardCode===row.code;
  return `

     style="${isOpen?'border-color:'+color+'60':''}">
  <div class="s-row" onclick="toggleCard('${row.code}')">
    <div class="rank${rank<=3?' top':''}">${rank}</div>
    <div class="s-name-wrap">
      <div class="s-name">
        ${row.name}
        ${row.limitUp?'<span class="limit-badge">상한가</span>':''}
      </div>
      <div class="s-meta">
        <span class="sector-tag" style="color:${color};background:${bg}">${row.sectorLabel}</span>
        <span>${row.code}</span>
      </div>
    </div>
    <div class="s-price" style="color:${color}">${fmtPrice(row.price)}</div>
    <div class="s-change" style="color:${color}">▲ ${row.change.toFixed(2)}%</div>
    <div class="s-vol">${fmtVol(row.volume)}</div>
  </div>
  <div class="inline-panel">
    <div class="inline-grid">
      <div class="info-box"><div class="ib-label">시가</div><div class="ib-val">${fmtPrice(row.open)}</div></div>
      <div class="info-box"><div class="ib-label">고가</div><div class="ib-val red">${fmtPrice(row.high)}</div></div>
      <div class="info-box"><div class="ib-label">저가</div><div class="ib-val blue">${fmtPrice(row.low)}</div></div>

      <div class="info-box"><div class="ib-label">거래대금</div><div class="ib-val">${fmtVol(row.volume)}</div></div>

    </div>
    <div class="inline-actions">
      <button class="ia-btn" style="color:${color};border-color:${color}40"
              onclick="openDetail('${row.code}')">📊 상세보기</button>
      <button class="ia-btn" onclick="toggleCard('${row.code}')">닫기</button>
    </div>
  </div>
</div>`;
}

function renderSector(){
  const rows=getFiltered(S.currentSector);
  const el=document.getElementById('sectorList');
  if(!rows.length){
    el.innerHTML='<div class="empty">조건에 맞는 종목이 없습니다.<br><small>환경설정에서 기준값을 낮춰보세요</small></div>';
    return;
  }
  el.innerHTML=rows.map((r,i)=>buildCard(r,i+1)).join('');
  document.getElementById('updateTime1').textContent='업데이트: '+new Date().toLocaleTimeString('ko-KR');
  document.getElementById('filterLabel').textContent=S.minChange;
}

function renderVolume(){
  const rows=[...allStocks()];
  const sk=(document.getElementById('volumeSort')||{}).value||'volume';
  rows.sort((a,b)=>sk==='change'?b.change-a.change:sk==='price'?b.price-a.price:b.volume-a.volume);
  const el=document.getElementById('volumeList');
  el.innerHTML=rows.slice(0,S.maxItems).map((r,i)=>buildCard(r,i+1)).join('');
  document.getElementById('updateTime2').textContent='업데이트: '+new Date().toLocaleTimeString('ko-KR');
}

function renderAll(){
  renderSector(); renderVolume();
  const nb=document.querySelector('.news-bar');
  if(nb) nb.style.display=S.showNews?'flex':'none';

/* ═══════════════════════════════════════
   인라인 토글
═══════════════════════════════════════ */
function toggleCard(code){
  const prev=S.openCardCode;
  S.openCardCode=(prev===code?null:code);
  if(prev){
    const pc=document.getElementById('card-'+prev);
    if(pc){pc.classList.remove('open');pc.style.borderColor=''}
  }
  if(S.openCardCode){
    const nc=document.getElementById('card-'+code);
    if(nc){
      const [color]=sectorColor(findStock(code).sector);
      nc.classList.add('open');
      nc.style.borderColor=color+'60';
      setTimeout(()=>nc.scrollIntoView({behavior:'smooth',block:'nearest'}),50);
    }
  }
}

function findStock(code){return allStocks().find(x=>x.code===code)||{}}

/* ═══════════════════════════════════════
   상세 모달
═══════════════════════════════════════ */
function openDetail(code){
  const row=findStock(code);
  if(!row.code) return;
  const [color,bg]=sectorColor(row.sector);

  document.getElementById('modalName').textContent=row.name;
  document.getElementById('modalCode').textContent=row.code;
  const st=document.getElementById('modalSectorTag');
  st.textContent=row.sectorLabel;

  document.getElementById('modalPrice').textContent=fmtPrice(row.price);
  document.getElementById('modalPrice').style.color=color;
  document.getElementById('modalChange').textContent='▲ '+row.change.toFixed(2)+'%';
  document.getElementById('modalChange').style.color=color;
  document.getElementById('modalChangeAbs').textContent=
    '전일대비 +'+fmtPrice(Math.round(row.price-row.prevClose))+'원';

  const gd=[
    {l:'시가',v:fmtPrice(row.open),c:''},
    {l:'고가',v:fmtPrice(row.high),c:'red'},
    {l:'저가',v:fmtPrice(row.low),c:'blue'},
    {l:'전일종가',v:fmtPrice(row.prevClose),c:''},
    {l:'거래대금',v:fmtVol(row.volume),c:''},
    {l:'시가총액',v:row.marketCap,c:''},
    {l:'PBR',v:row.pbr+'배',c:''},
    {l:'PER',v:row.per?row.per+'배':'N/A',c:''},
    {l:'상장주수',v:(row.shares/10).toFixed(1)+'만주',c:''},
  ];
  document.getElementById('modalGrid').innerHTML=gd.map(g=>`
    <div class="modal-box">
      <div class="mb-label">${g.l}</div>
      <div class="mb-val ${g.c}">${g.v}</div>
    </div>`).join('');

  const asks=Array.from({length:5},(_,i)=>({
    p:row.price+(5-i)*Math.round(row.price*.002),
    q:Math.floor(Math.random()*3000+500)
  }));
  const bids=Array.from({length:5},(_,i)=>({
    p:row.price-(i+1)*Math.round(row.price*.002),
    q:Math.floor(Math.random()*3000+500)
  }));
  document.getElementById('modalOrderbook').innerHTML=`
    <div class="ob-col">
      <div class="ob-title ask">매도호가</div>
      ${asks.map(a=>`<div class="ob-row ask"><div class="p">${fmtPrice(a.p)}</div><div class="q">${a.q.toLocaleString()}</div></div>`).join('')}
    </div>
    <div class="ob-col">
      <div class="ob-title bid">매수호가</div>
      ${bids.map(b=>`<div class="ob-row bid"><div class="p">${fmtPrice(b.p)}</div><div class="q">${b.q.toLocaleString()}</div></div>`).join('')}
    </div>`;

  document.getElementById('modalCompanyInfo').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:14px">
      <div style="color:var(--sub)">섹터</div><div style="font-weight:600">${row.sectorLabel}</div>
      <div style="color:var(--sub)">종목코드</div><div style="font-weight:600">${row.code}</div>
      <div style="color:var(--sub)">시가총액</div><div style="font-weight:600">${row.marketCap}</div>
      <div style="color:var(--sub)">등락률</div>
      <div style="font-weight:600;color:${color}">▲ ${row.change.toFixed(2)}%</div>
    </div>`;

/* ═══════════════════════════════════════

document.querySelectorAll('.nav-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    S.currentTab=btn.dataset.tab;
    document.querySelectorAll('.nav-tab').forEach(b=>b.classList.toggle('active',b===btn));
    ['sector','volume','calendar','notice'].forEach(t=>{
      document.getElementById('tab-'+t).classList.toggle('hidden',t!==btn.dataset.tab);
    });
  });
});

  btn.addEventListener('click',()=>{
    S.currentSector=btn.dataset.sector;
    document.querySelectorAll('#sectorMenu .s-chip').forEach(b=>b.classList.toggle('active',b===btn));
    S.openCardCode=null;
    renderSector();
  });
});

document.querySelectorAll('.f-chip[data-change]').forEach(btn=>{
  btn.addEventListener('click',()=>{
    S.minChange=parseFloat(btn.dataset.change)||0;

    renderSector();
  });

/* ═══════════════════════════════════════
   데이터 갱신
═══════════════════════════════════════ */
function refreshData(){
  allStocks().forEach(row=>{
    const drift=(Math.random()-.48)*.004;
    row.price=Math.max(100,Math.round(row.price*(1+drift)));
    row.change=parseFloat((row.change+(Math.random()-.5)*.2).toFixed(2));
    row.high=Math.max(row.high,row.price);
    row.low=Math.min(row.low,row.price);
  });
  renderAll();
  if(S.limitUpAlert){
    allStocks().forEach(row=>{
      if(row.limitUp) toast('🚨 '+row.name+' 상한가!');
      else if(row.change>=S.alertChange) toast('⚡ '+row.name+' +'+row.change.toFixed(2)+'% 급등');
    });
  }
}

/* ═══════════════════════════════════════
   타이머
═══════════════════════════════════════ */
function startTimer(){
  clearInterval(S.timer);
  S.countdown=S.refreshInterval;
  if(!S.autoRefresh){
    document.getElementById('countdown').textContent='자동갱신 꺼짐'; return;
  }
  S.timer=setInterval(()=>{
    S.countdown--;
    document.getElementById('countdown').textContent=S.countdown+'s';
    if(S.countdown<=0){refreshData();S.countdown=S.refreshInterval;}
  },1000);
}

/* ═══════════════════════════════════════
   장 상태
═══════════════════════════════════════ */
function updateMarket(){
  const t=new Date(), m=t.getHours()*60+t.getMinutes();
  const el=document.getElementById('marketStatus');
  if(m>=9*60&&m<15*60+30){
    el.textContent='● 장중';
    el.style.cssText='color:#17a663;background:#edfcf2;border:1px solid #c3f2da;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600';
  }else if(m>=8*60+30&&m<9*60){
    el.textContent='● 장전';
    el.style.cssText='color:#d97706;background:#fffbeb;border:1px solid #fde68a;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600';
  }else{
    el.textContent='● 장마감';
    el.style.cssText='color:#94a3b8;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600';
  }
}

        <span onclick="this.previousElementSibling.click()"
          style="position:absolute;inset:0;border-radius:999px;background:${bg};cursor:pointer;transition:.2s">
          <span style="position:absolute;width:20px;height:20px;background:#fff;border-radius:50%;top:3px;left:${lft};transition:.2s"></span>
        </span>
      </label>
    </div>`;
  });
  document.getElementById('settingRows').innerHTML=html;
}

async function testApi(){
  const key=document.getElementById('appKey').value.trim();
  const sec=document.getElementById('appSecret').value.trim();
  const status=document.getElementById('apiStatus');
  if(!key||!sec){status.textContent='App Key와 Secret을 입력해주세요';return}
  status.textContent='연결 테스트 중...';
  const domain=document.getElementById('mockMode').checked
    ?'https://openapivts.koreainvestment.com:29443'
    :'https://openapi.koreainvestment.com:9443';
  try{
    const res=await fetch(domain+'/oauth2/tokenP',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({grant_type:'client_credentials',appkey:key,appsecret:sec})
    });
    const d=await res.json();
    if(d.access_token){
      status.textContent='✅ 연결 성공 — 토큰 발급 완료';
      status.style.color='var(--green)';
    }else{
      status.textContent='❌ 실패: '+JSON.stringify(d);
      status.style.color='var(--red)';
    }
  }catch(e){
    status.textContent='❌ 네트워크 오류 (CORS 또는 키 오류)';
    status.style.color='var(--red)';
  }
}

function toast(msg){
  const el=document.createElement('div');
  el.className='toast'; el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2400);
}
